<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>האתר החדש של הלל</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .container {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #00adb5;
            display: inline-block;
            margin-top: 20px;
        }
        h1 { color: #00adb5; }
        #canvas {
            background: #000;
            display: block;
            margin: 20px auto;
            border: 2px solid #333;
        }
        .btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1.1rem;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎉 האתר החדש של הלל מתחיל מפה! 🎉</h1>
        <p>אם אתה רואה את הדף הזה, הצלחנו לאפס את האתר מהתחלה.</p>
        
        <hr style="border: 1px solid #333; margin: 20px 0;">
        
        <h3>🐍 משחק הנחש (Snake)</h3>
        <p>ניקוד: <span id="score" style="color:#00adb5; font-weight:bold;">0</span></p>
        <canvas id="canvas" width="240" height="240"></canvas>
        <button class="btn" onclick="startSnake()">התחל משחק</button>
    </div>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        let box = 12, snake, food, d, score, interval;

        function startSnake() {
            clearInterval(interval);
            snake = [{x: 9*box, y: 10*box}];
            food = {x: Math.floor(Math.random()*20)*box, y: Math.floor(Math.random()*20)*box};
            score = 0;
            document.getElementById("score").innerText = score;
            d = "RIGHT";
            interval = setInterval(draw, 140);
        }

        document.addEventListener("keydown", e => {
            if(e.keyCode == 37 && d != "RIGHT") d = "LEFT";
            if(e.keyCode == 38 && d != "DOWN") d = "UP";
            if(e.keyCode == 39 && d != "LEFT") d = "RIGHT";
            if(e.keyCode == 40 && d != "UP") d = "DOWN";
        });

        function draw() {
            ctx.fillStyle = "#000"; ctx.fillRect(0, 0, 240, 240);
            for(let i=0; i<snake.length; i++) {
                ctx.fillStyle = i==0 ? "#00adb5" : "#00f5ff";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
            }
            ctx.fillStyle = "red"; ctx.fillRect(food.x, food.y, box, box);
            
            let nx = snake[0].x, ny = snake[0].y;
            if(d == "LEFT") nx -= box; if(d == "UP") ny -= box;
            if(d == "RIGHT") nx += box; if(d == "DOWN") ny += box;

            if(nx == food.x && ny == food.y) {
                score++; document.getElementById("score").innerText = score;
                food = {x: Math.floor(Math.random()*20)*box, y: Math.floor(Math.random()*20)*box};
            } else { snake.pop(); }

            let head = {x: nx, y: ny};
            if(nx<0 || nx>=240 || ny<0 || ny>=240 || snake.some(s => s.x==head.x && s.y==head.y)) {
                clearInterval(interval);
                alert("המשחק נגמר! ניקוד: " + score);
                return;
            }
            snake.unshift(head);
        }
    </script>
</body>
</html>
