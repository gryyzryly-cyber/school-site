<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת הפעלה - חיי בית הספר</title>
    <style>
        /* רקע שחור מלא על כל העמוד */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
        }

        /* מסך נעילה פשוט - חייב להופיע במרכז */
        #lock-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #333;
            width: 280px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .pin-input {
            font-size: 2rem;
            width: 140px;
            text-align: center;
            background: #2d2d2d;
            color: #fff;
            border: 1px solid #444;
            padding: 5px;
            margin-bottom: 15px;
            border-radius: 5px;
        }

        .pin-btn {
            background-color: #00adb5;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
        }

        /* מערכת הפעלה ראשית - תופסת את כל המסך */
        #main-os {
            display: none;
            width: 100%;
            min-height: 100vh;
        }

        .top-bar {
            background-color: #1e1e1e;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
        }

        .nav-tabs {
            display: flex;
            background-color: #181818;
            padding: 10px;
            gap: 10px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #aaa;
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 5px;
        }

        .tab-btn.active {
            background-color: #00adb5;
            color: white;
        }

        .content-section {
            display: none;
            padding: 25px;
        }

        .content-section.active {
            display: block;
        }

        .card {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
            margin-bottom: 20px;
        }

        /* מד התקדמות */
        .progress-container {
            background-color: #333;
            border-radius: 5px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-bar {
            background-color: #00adb5;
            height: 20px;
            width: 0%;
        }

        .timeline-item, .task-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #252525;
        }

        .delete-btn {
            background: none;
            border: none;
            color: red;
            cursor: pointer;
            display: none;
        }

        .admin-controls {
            display: none;
            background: #1e1e1e;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px dashed #00adb5;
        }

        .admin-input {
            background: #121212;
            border: 1px solid #444;
            color: #fff;
            padding: 5px;
            border-radius: 5px;
            margin-left: 10px;
        }

        /* משחקים */
        .games-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .games-grid { grid-template-columns: 1fr; }
        }

        .memory-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 300px;
            margin: 15px auto;
        }

        .memory-card {
            height: 70px;
            background-color: #00adb5;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            color: transparent;
            cursor: pointer;
        }

        .memory-card.flipped {
            background-color: #fff;
            color: #121212;
        }

        .memory-card.matched {
            background-color: #28a745;
            color: white;
        }

        .game-input {
            width: 80px;
            font-size: 1.5rem;
            text-align: center;
            background: #121212;
            color: #fff;
            border: 1px solid #444;
            padding: 5px;
        }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h2>🔒 קוד גישה</h2>
        <input type="password" id="pin-code" class="pin-input" maxlength="4" placeholder="••••">
        <br>
        <button class="pin-btn" onclick="checkPin()">כניסה</button>
        <div id="lock-error" style="color: red; margin-top: 10px;"></div>
    </div>

    <div id="main-os">
        <div class="top-bar">
            <h2>⚡ SCHOOL OS v5.0</h2>
            <button class="pin-btn" onclick="toggleAdminMode()" style="background:#252525; border:1px solid #333;">⚙️ מרכז שליטה</button>
        </div>

        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('my-day')">📅 היום שלי</button>
            <button class="tab-btn" onclick="switchTab('my-tasks')">🚀 משימות</button>
            <button class="tab-btn" onclick="switchTab('my-games')">🎮 משחקים</button>
        </div>

        <div id="admin-panel" style="padding: 10px 25px 0 25px; display: none;">
            <div class="admin-controls" id="day-controls">
                <h5>➕ הוספת אירוע ללו"ז:</h5>
                שעה: <input type="text" id="new-time" class="admin-input" placeholder="08:00" style="width: 60px;">
                פעילות: <input type="text" id="new-activity" class="admin-input" placeholder="שיעור">
                <button class="pin-btn" style="padding: 5px 10px;" onclick="addTimelineItem()">הוסף</button>
            </div>
            <div class="admin-controls" id="task-controls">
                <h5>➕ הוספת משימה:</h5>
                תיאור: <input type="text" id="new-task-text" class="admin-input" placeholder="משימה...">
                <button class="pin-btn" style="padding: 5px 10px;" onclick="addTaskItem()">הוסף</button>
            </div>
        </div>

        <div id="my-day" class="content-section active">
            <div class="card">
                <h3>⏰ הלו"ז שלי</h3>
                <div id="timeline-list">
                    <div class="timeline-item">
                        <div><b>08:00</b> - 🎒 הגעה וארגון</div>
                        <button class="delete-btn" onclick="this.parentElement.remove()">🗑️</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="my-tasks" class="content-section">
            <div class="card">
                <h3>⭐ מד התקדמות משימות</h3>
                <div class="progress-container"><div id="p-bar" class="progress-bar"></div></div>
                <div id="tasks-list">
                    <div class="task-item">
                        <label><input type="checkbox" class="task-check" onclick="updateProgress()"> 📝 משימה ראשונה</label>
                        <button class="delete-btn" onclick="this.parentElement.remove(); updateProgress();">🗑️</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="my-games" class="content-section">
            <div class="games-grid">
                <div class="card">
                    <h3>🧩 משחק הזיכרון</h3>
                    <div class="memory-board" id="mem-board"></div>
                    <button class="pin-btn" onclick="resetMemoryGame()">התחל מחדש</button>
                </div>
                <div class="card">
                    <h3>🔢 ניחוש מספר (1-100)</h3>
                    <input type="number" id="guess-input" class="game-input">
                    <button class="pin-btn" onclick="playGuessGame()">ניחוש</button>
                    <p id="guess-hint" style="margin-top: 10px; color: #00adb5;">בחר מספר</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let secretPin = '1234';
        let isAdmin = false;

        function checkPin() {
            const enteredPin = document.getElementById('pin-code').value;
            if (enteredPin === secretPin) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-os').style.display = 'block';
                resetMemoryGame();
                updateProgress();
            } else {
                document.getElementById('lock-error').innerText = '❌ קוד שגוי!';
            }
        }

        function toggleAdminMode() {
            if (!isAdmin) {
                const pass = prompt("🔐 הקש סיסמה (1234):");
                if (pass === secretPin) {
                    isAdmin = true;
                    document.getElementById('admin-panel').style.display = 'block';
                    document.querySelectorAll('.admin-controls').forEach(el => el.style.display = 'block');
                    document.querySelectorAll('.delete-btn').forEach(el => el.style.display = 'inline-block');
                }
            } else {
                isAdmin = false;
                document.getElementById('admin-panel').style.display = 'none';
                document.querySelectorAll('.admin-controls').forEach(el => el.style.display = 'none');
                document.querySelectorAll('.delete-btn').forEach(el => el.style.display = 'none');
            }
        }

        function addTimelineItem() {
            const time = document.getElementById('new-time').value;
            const activity = document.getElementById('new-activity').value;
            if(!time || !activity) return;
            const list = document.getElementById('timeline-list');
            const newItem = document.createElement('div');
            newItem.classList.add('timeline-item');
            newItem.innerHTML = `<div><b>${time}</b> - ${activity}</div><button class="delete-btn" style="display:inline-block;" onclick="this.parentElement.remove()">🗑️</button>`;
            list.appendChild(newItem);
            document.getElementById('new-time').value = '';
            document.getElementById('new-activity').value = '';
        }

        function addTaskItem() {
            const taskText = document.getElementById('new-task-text').value;
            if(!taskText) return;
            const list = document.getElementById('tasks-list');
            const newItem = document.createElement('div');
            newItem.classList.add('task-item');
            newItem.innerHTML = `<label><input type="checkbox" class="task-check" onclick="updateProgress()"> 📝 ${taskText}</label><button class="delete-btn" style="display:inline-block;" onclick="this.parentElement.remove(); updateProgress();">🗑️</button>`;
            list.appendChild(newItem);
            document.getElementById('new-task-text').value = '';
            updateProgress();
        }

        function switchTab(tabId) {
            document.querySelectorAll('.content-section').forEach(section => section.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function updateProgress() {
            const checkboxes = document.querySelectorAll('.task-check');
            const checked = document.querySelectorAll('.task-check:checked');
            if(checkboxes.length === 0) { document.getElementById('p-bar').style.width = '0%'; return; }
            document.getElementById('p-bar').style.width = ((checked.length / checkboxes.length) * 100) + '%';
        }

        let secretNumber = Math.floor(Math.random() * 100) + 1;
        function playGuessGame() {
            const userGuess = parseInt(document.getElementById('guess-input').value);
            const hint = document.getElementById('guess-hint');
            if (isNaN(userGuess)) return;
            if (userGuess === secretNumber) { hint.innerHTML = '🎉 בול!'; secretNumber = Math.floor(Math.random() * 100) + 1; }
            else if (userGuess > secretNumber) { hint.innerHTML = '📉 גבוה מדי!'; }
            else { hint.innerHTML = '📈 נמוך מדי!'; }
        }

        const icons = ['🍎', '🍎', '⚽', '⚽', '🧠', '🧠', '🎒', '🎒', '🎨', '🎨', '📚', '📚', '📝', '📝', '⭐', '⭐'];
        let flippedCards = [];
        let matchedCount = 0;

        function resetMemoryGame() {
            const board = document.getElementById('mem-board');
            board.innerHTML = ''; flippedCards = []; matchedCount = 0;
            const shuffled = icons.sort(() => 0.5 - Math.random());
            shuffled.forEach((icon, index) => {
                const card = document.createElement('div');
                card.classList.add('memory-card');
                card.dataset.icon = icon;
                card.innerText = icon;
                card.addEventListener('click', flipCard);
                board.appendChild(card);
            });
        }

        function flipCard() {
            if (flippedCards.length === 2 || this.classList.contains('flipped') || this.classList.contains('matched')) return;
            this.classList.add('flipped');
            flippedCards.push(this);
            if (flippedCards.length === 2) {
                if (flippedCards[0].dataset.icon === flippedCards[1].dataset.icon) {
                    flippedCards[0].classList.add('matched'); flippedCards[1].classList.add('matched');
                    matchedCount += 2; flippedCards = [];
                    if (matchedCount === icons.length) { alert('🏆 ניצחת!'); }
                } else {
                    setTimeout(() => { flippedCards[0].classList.remove('flipped'); flippedCards[1].classList.remove('flipped'); flippedCards = []; }, 1000);
                }
            }
        }
    </script>
</body>
</html>
