<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCHOOL OS v25.0 - Ultimate Edition</title>
    <style>
        :root {
            --bg-main: #030305;
            --bg-card: #09090d;
            --bg-input: #010102;
            --primary: #00adb5;
            --primary-glow: rgba(0, 173, 181, 0.4);
            --danger: #ff4a4a;
            --success: #28a745;
            --text-main: #e4e6eb;
            --text-muted: #8f94a0;
            --border: #161622;
        }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-main); color: var(--text-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
        }

        #main-os { width: 100%; min-height: 100vh; display: flex; flex-direction: column; }

        /* בר עליון */
        .top-bar {
            background-color: var(--bg-card); padding: 15px 25px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }
        .top-bar h2 { margin: 0; font-size: 1.3rem; color: var(--primary); text-shadow: 0 0 10px var(--primary-glow); }

        /* ניווט טאבים */
        .nav-tabs { display: flex; background-color: #060609; padding: 12px; gap: 12px; border-bottom: 1px solid #11111a; justify-content: center; }
        .tab-btn {
            background: var(--bg-card); border: 1px solid var(--border); color: var(--text-muted);
            padding: 12px 26px; font-size: 0.95rem; cursor: pointer; border-radius: 10px; font-weight: 600;
            transition: all 0.2s ease;
        }
        .tab-btn:hover { color: #fff; border-color: var(--primary); background-color: #11111a; }
        .tab-btn.active { background-color: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }

        /* אזורי תוכן */
        .content-section { display: none; padding: 30px 20px; max-width: 850px; width: 100%; box-sizing: border-box; margin: 0 auto; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        /* כרטיסיות */
        .card { background: var(--bg-card); padding: 25px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 25px; box-shadow: 0 8px 24px rgba(0,0,0,0.6); }
        .card h3 { margin-top: 0; margin-bottom: 20px; font-size: 1.2rem; border-right: 4px solid var(--primary); padding-right: 12px; color: #fff; }

        /* מד התקדמות */
        .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .progress-container { background-color: #11111a; border-radius: 20px; overflow: hidden; margin: 15px 0 25px 0; height: 22px; border: 1px solid #1c1c2b; }
        .progress-bar { background: linear-gradient(90deg, var(--primary), #00f5ff); height: 100%; width: 0%; transition: width 0.3s ease; box-shadow: 0 0 12px rgba(0, 245, 255, 0.5); }

        /* פריטי רשימה */
        .timeline-item, .task-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 14px; border-bottom: 1px solid #11111a; border-radius: 8px; transition: background 0.15s; }
        .timeline-item:hover, .task-item:hover { background: #11111a; }
        .task-item label { cursor: pointer; display: flex; align-items: center; gap: 12px; user-select: none; }
        .task-item input[type="checkbox"] { accent-color: var(--primary); width: 18px; height: 18px; cursor: pointer; }

        .delete-btn { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1.1rem; display: none; opacity: 0.6; transition: transform 0.15s, opacity 0.15s; }
        .delete-btn:hover { opacity: 1; transform: scale(1.15); }

        /* פאנל ניהול */
        #admin-panel { background: #0d0d14; padding: 25px; border-radius: 16px; margin: 25px auto; max-width: 550px; width: 90%; border: 2px dashed var(--primary); display: none; box-shadow: 0 0 20px rgba(0, 173, 181, 0.15); }
        .admin-controls { margin-bottom: 20px; }
        .admin-controls h5 { margin: 0 0 10px 0; color: var(--text-muted); font-size: 0.95rem; }
        .admin-input { background: var(--bg-input); border: 1px solid #1c1c2b; color: #fff; padding: 10px 12px; border-radius: 8px; margin: 5px; font-size: 0.9rem; }
        .admin-input:focus { outline: none; border-color: var(--primary); }

        /* גריד משחקים */
        .games-grid { display: grid; grid-template-columns: 1fr; gap: 25px; }
        @media (min-width: 750px) { .games-grid { grid-template-columns: 1fr 1fr; } }

        /* קנבס משחק חלליות */
        #space-canvas { background-color: var(--bg-input); display: block; margin: 20px auto; border: 2px solid var(--border); border-radius: 12px; box-shadow: 0 0 25px rgba(0,0,0,0.8); }
        .shake { animation: shakeCanvas 0.35s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shakeCanvas { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(3px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-3px, 0, 0); } 40%, 60% { transform: translate3d(3px, 0, 0); } }

        .space-controls { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .space-btn { background-color: #11111a; color: white; border: 1px solid #1c1c2b; padding: 14px 35px; font-size: 1.1rem; border-radius: 10px; cursor: pointer; font-weight: bold; user-select: none; transition: all 0.1s; }
        .space-btn:active { background-color: var(--primary); transform: scale(0.96); }

        /* פריסת לוחות משחקים */
        .memory-board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 260px; margin: 20px auto; }
        .memory-card { height: 60px; background-color: var(--primary); border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 1.6rem; color: transparent; cursor: pointer; user-select: none; transition: transform 0.2s, background-color 0.2s; }
        .memory-card:hover { transform: scale(1.04); }
        .memory-card.flipped { background-color: #fff; color: #121212; transform: rotateY(180deg); }
        .memory-card.matched { background-color: var(--success); color: white; cursor: default; }

        .tic-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-width: 190px; margin: 20px auto; }
        .tic-cell { width: 58px; height: 58px; background-color: #11111a; border: 1px solid #1c1c2b; border-radius: 10px; font-size: 1.8rem; font-weight: bold; display: flex; justify-content: center; align-items: center; cursor: pointer; user-select: none; transition: background 0.1s; }
        .tic-cell:hover { background-color: #1c1c2b; }

        .game-input { width: 90px; font-size: 1.3rem; text-align: center; background: var(--bg-input); color: #fff; border: 1px solid #1c1c2b; padding: 8px; border-radius: 8px; margin-left: 10px; }
        .pin-btn { background-color: var(--primary); color: white; border: none; padding: 10px 22px; font-size: 0.95rem; border-radius: 8px; cursor: pointer; font-weight: bold; transition: background 0.15s; }
        .pin-btn:hover { background-color: #008c94; }
    </style>
</head>
<body>

    <div id="main-os">
        <div class="top-bar">
            <h2>⚡ SCHOOL OS v25.0 Ultimate</h2>
            <button class="pin-btn" onclick="toggleAdminMode()" style="background:#11111a; border:1px solid #1c1c2b; font-size: 1rem; padding: 8px 16px;">⚙️ עריכת לו"ז ומשימות</button>
        </div>

        <div class="nav-tabs">
            <button id="tab-day" class="tab-btn" onclick="switchTab('my-day', 'tab-day')">📅 היום שלי</button>
            <button id="tab-tasks" class="tab-btn" onclick="switchTab('my-tasks', 'tab-tasks')">🚀 משימות</button>
            <button id="tab-games" class="tab-btn" onclick="switchTab('my-games', 'tab-games')">🎮 מרכז המשחקים</button>
        </div>

        <div id="admin-panel">
            <h3 style="color: var(--primary); margin: 0; border: none; padding: 0;">🛠️ מערכת ניהול תוכן</h3>
            <div class="admin-controls" style="margin-top:15px;">
                <h5>➕ הוספת פעילות ללו"ז:</h5>
                שעה: <input type="text" id="new-time" class="admin-input" placeholder="08:00" style="width: 65px;">
                פעילות: <input type="text" id="new-activity" class="admin-input" placeholder="שיעור...">
                <button class="pin-btn" style="padding: 6px 16px; font-size: 0.85rem;" onclick="addTimelineItem()">הוסף</button>
            </div>
            <div class="admin-controls">
                <h5>➕ הוספת משימה:</h5>
                תיאור: <input type="text" id="new-task-text" class="admin-input" placeholder="רשום משימה...">
                <button class="pin-btn" style="padding: 6px 16px; font-size: 0.85rem;" onclick="addTaskItem()">הוסף</button>
            </div>
        </div>

        <div id="my-day" class="content-section">
            <div class="card">
                <h3>⏰ הלו"ז היומי שלי</h3>
                <div id="timeline-list"></div>
            </div>
        </div>

        <div id="my-tasks" class="content-section">
            <div class="card">
                <div class="progress-header">
                    <h3>⭐ מד התקדמות משימות</h3>
                    <span id="star-count" style="font-size: 1.1rem; font-weight: bold; color: var(--primary);">✨ 0%</span>
                </div>
                <div class="progress-container"><div id="p-bar" class="progress-bar"></div></div>
                <div id="tasks-list"></div>
            </div>
        </div>

        <div id="my-games" class="content-section">
            <div class="games-grid">
                <div class="card" style="text-align: center;">
                    <h3>🧩 משחק הזיכרון</h3>
                    <div class="memory-board" id="mem-board"></div>
                    <button class="pin-btn" style="padding: 6px 14px; font-size: 0.85rem;" onclick="resetMemoryGame()">התחל מחדש</button>
                </div>
                
                <div class="card" style="text-align: center;">
                    <h3>🔢 ניחוש מספר (1-100)</h3>
                    <div style="margin: 15px 0;">
                        <input type="number" id="guess-input" class="game-input">
                        <button class="pin-btn" style="padding: 8px 16px; font-size: 0.9rem;" onclick="playGuessGame()">ניחוש</button>
                    </div>
                    <p id="guess-hint" style="color: var(--primary); font-weight: bold; margin: 10px 0 0 0;">בחר מספר להתחלה</p>
                </div>

                <div class="card" style="text-align: center;">
                    <h3>🚀 קרב חלליות רטרו</h3>
                    <p style="margin: 5px 0;">ניקוד: <span id="space-score" style="color:var(--primary); font-weight:bold;">0</span></p>
                    <canvas id="space-canvas" width="240" height="180"></canvas>
                    <button class="pin-btn" onclick="startSpaceGame()" style="background-color: var(--success); padding: 6px 14px; font-size: 0.85rem;">אפס חלליות</button>
                    <div class="space-controls">
                        <button class="space-btn" id="btn-left">◄ שמאל</button>
                        <button class="space-btn" id="btn-right">ימין ►</button>
                    </div>
                </div>

                <div class="card" style="text-align: center;">
                    <h3>❌ משחק איקס עיגול ⭕</h3>
                    <p id="tic-status" style="color: var(--primary); font-weight: bold; margin-bottom: 15px;">תור השחקן: X</p>
                    <div class="tic-board" id="tic-board"></div>
                    <button class="pin-btn" style="padding: 6px 14px; font-size: 0.85rem;" onclick="resetTicGame()">אפס משחק</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- ניהול מצב (State Management) ---
        let state = {
            isAdmin: false,
            currentTab: 'my-day',
            timeline: JSON.parse(localStorage.getItem('schoolOS_timeline')) || [
                { id: 1, time: "08:00", text: "🎒 הגעה וארגון כיתה" },
                { id: 2, time: "08:15", text: "📚 שיעור ראשון" }
            ],
            tasks: JSON.parse(localStorage.getItem('schoolOS_tasks')) || [
                { id: 1, text: "להכין מערכת למחר", checked: false }
            ]
        };

        // --- מנוע קול דיגיטלי ---
        let audioCtx = null;
        function playSound(type) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            try {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                if (type === 'laser') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(850, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.12);
                    gain.gain.setValueAtTime(0.05, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.12);
                } else if (type === 'explosion') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(120, audioCtx.currentTime);
                    osc.frequency.linearRampToValueAtTime(30, audioCtx.currentTime + 0.25);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.25);
                } else if (type === 'win') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                    osc.frequency.setValueAtTime(554, audioCtx.currentTime + 0.08);
                    osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.16);
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.35);
                }
            } catch(e) {}
        }

        // --- רינדור ממשק (UI Rendering) ---
        function renderTimeline() {
            const container = document.getElementById('timeline-list');
            container.innerHTML = state.timeline.map(item => `
                <div class="timeline-item">
                    <div><b>${item.time}</b> - ${item.text}</div>
                    <button class="delete-btn" style="display: ${state.isAdmin ? 'inline-block' : 'none'}" onclick="deleteTimelineItem(${item.id})">🗑️</button>
                </div>
            `).join('');
        }

        function renderTasks() {
            const container = document.getElementById('tasks-list');
            container.innerHTML = state.tasks.map(item => `
                <div class="task-item">
                    <label>
                        <input type="checkbox" class="task-check" ${item.checked ? 'checked' : ''} onclick="toggleTask(${item.id})">
                        <span>📝 ${item.text}</span>
                    </label>
                    <button class="delete-btn" style="display: ${state.isAdmin ? 'inline-block' : 'none'}" onclick="deleteTaskItem(${item.id})">🗑️</button>
                </div>
            `).join('');
            updateProgressBar();
        }

        function updateProgressBar() {
            const total = state.tasks.length;
            const checked = state.tasks.filter(t => t.checked).length;
            const percentage = total === 0 ? 0 : Math.round((checked / total) * 100);
            document.getElementById('p-bar').style.width = percentage + '%';
            
            const starCountEl = document.getElementById('star-count');
            if(percentage === 100 && total > 0) {
                if(starCountEl.innerText !== '🌟 100% מושלם!') { starCountEl.innerText = '🌟 100% מושלם!'; playSound('win'); }
            } else {
                starCountEl.innerText = `✨ ${percentage}%`;
            }
        }

        // --- פעולות (Actions) ---
        function toggleAdminMode() { state.isAdmin = !state.isAdmin; document.getElementById('admin-panel').style.display = state.isAdmin ? 'block' : 'none'; renderTimeline(); renderTasks(); }
        function switchTab(tabId, btnId) { state.currentTab = tabId; if(tabId !== 'my-games') stopSpaceEngine(); document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none'); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById(tabId).style.display = 'block'; document.getElementById(btnId).classList.add('active'); if(tabId === 'my-games') startSpaceGame(); }
        
        function addTimelineItem() { const time = document.getElementById('new-time').value; const text = document.getElementById('new-activity').value; if(!time || !text) return; state.timeline.push({ id: Date.now(), time, text }); document.getElementById('new-time').value = ''; document.getElementById('new-activity').value = ''; localStorage.setItem('schoolOS_timeline', JSON.stringify(state.timeline)); renderTimeline(); }
        function deleteTimelineItem(id) { state.timeline = state.timeline.filter(item => item.id !== id); localStorage.setItem('schoolOS_timeline', JSON.stringify(state.timeline)); renderTimeline(); }
        
        function addTaskItem() { const text = document.getElementById('new-task-text').value; if(!text) return; state.tasks.push({ id: Date.now(), text, checked: false }); document.getElementById('new-task-text').value = ''; localStorage.setItem('schoolOS_tasks', JSON.stringify(state.tasks)); renderTasks(); }
        function deleteTaskItem(id) { state.tasks = state.tasks.filter(item => item.id !== id); localStorage.setItem('schoolOS_tasks', JSON.stringify(state.tasks)); renderTasks(); }
        function toggleTask(id) { const task = state.tasks.find(t => t.id === id); if(task) { task.checked = !task.checked; localStorage.setItem('schoolOS_tasks', JSON.stringify(state.tasks)); updateProgressBar(); } }

        /* משחק ניחושים */
        let secretNumber = Math.floor(Math.random() * 100) + 1;
        function playGuessGame() { const val = parseInt(document.getElementById('guess-input').value); const hint = document.getElementById('guess-hint'); if (isNaN(val)) return; if (val === secretNumber) { hint.innerHTML = '🎉 בול כל הכבוד!'; playSound('win'); secretNumber = Math.floor(Math.random() * 100) + 1; } else { hint.innerHTML = val > secretNumber ? '📉 גבוה מדי!' : '📈 נמוך מדי!'; } }

        /* משחק זיכרון */
        const icons = ['🍎', '🍎', '⚽', '⚽', '🧠', '🧠', '🎒', '🎒', '🎨', '🎨', '📚', '📚', '📝', '📝', '⭐', '⭐'];
        let flipped = []; let matchedCount = 0;
        function resetMemoryGame() { const board = document.getElementById('mem-board'); if(!board) return; board.innerHTML = ''; flipped = []; matchedCount = 0; [...icons].sort(() => 0.5 - Math.random()).forEach(icon => { const card = document.createElement('div'); card.classList.add('memory-card'); card.dataset.icon = icon; card.innerText = icon; card.onclick = flipCard; board.appendChild(card); }); }
        function flipCard() { if (flipped.length === 2 || this.classList.contains('flipped') || this.classList.contains('matched')) return; this.classList.add('flipped'); flipped.push(this); if (flipped.length === 2) { if (flipped[0].dataset.icon === flipped[1].dataset.icon) { flipped[0].classList.add('matched'); flipped[1].classList.add('matched'); matchedCount += 2; flipped = []; if(matchedCount === 16) playSound('win'); } else { setTimeout(() => { flipped[0].classList.remove('flipped'); flipped[1].classList.remove('flipped'); flipped = []; }, 800); } } }

        /* 🚀 מנוע חלליות חצי-מקצועי עם Delta Time ושליטת מקלדת מלאה */
        const canvas = document.getElementById("space-canvas");
        const ctx = canvas ? canvas.getContext("2d") : null;
        let playerX = 110, enemies = [], lasers = [], particles = [], spaceScore = 0, lastTime = 0, spaceAnimationId = null;
        let keys = { Left: false, Right: false };

        function startSpaceGame() { stopSpaceEngine(); playerX = canvas.width / 2 - 10; enemies = []; lasers = []; particles = []; spaceScore = 0; document.getElementById("space-score").innerText = spaceScore; lastTime = performance.now(); spaceAnimationId = requestAnimationFrame(updateSpaceGame); }
        function stopSpaceEngine() { if(spaceAnimationId) cancelAnimationFrame(spaceAnimationId); spaceAnimationId = null; }
        
        function triggerScreenShake() { canvas.classList.add('shake'); playSound('explosion'); setTimeout(() => canvas.classList.remove('shake'), 350); }
        function createExplosion(x, y) { playSound('laser'); for(let i=0; i<10; i++) { const angle = Math.random() * Math.PI * 2; const speed = Math.random() * 3 + 1; particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, alpha: 1 }); } }

        function setupControls() {
            window.addEventListener("keydown", e => { if (state.currentTab === 'my-games') { if(e.key === "ArrowLeft" || e.key === "a") keys.Left = true; if(e.key === "ArrowRight" || e.key === "d") keys.Right = true; if(e.key === " " || e.key === "ArrowUp") { lasers.push({x: playerX + 9, y: canvas.height - 20}); playSound('laser'); e.preventDefault(); } } });
            window.addEventListener("keyup", e => { if(e.key === "ArrowLeft" || e.key === "a") keys.Left = false; if(e.key === "ArrowRight" || e.key === "d") keys.Right = false; });
            
            const btnL = document.getElementById('btn-left'), btnR = document.getElementById('btn-right');
            if(!btnL) return;
            btnL.addEventListener('mousedown', () => keys.Left = true); btnL.addEventListener('touchstart', () => keys.Left = true);
            btnR.addEventListener('mousedown', () => keys.Right = true); btnR.addEventListener('touchstart', () => keys.Right = true);
            const stop = () => { keys.Left = false; keys.Right = false; };
            window.addEventListener('mouseup', stop); window.addEventListener('touchend', stop);
        }

        function updateSpaceGame(timestamp) {
            if (state.currentTab !== 'my-games' || !ctx) return;
            let dt = (timestamp - lastTime) / 16.66; // נורמליזציה לפי 60fps
            lastTime = timestamp;

            ctx.fillStyle = "#010102"; ctx.fillRect(0, 0, canvas.width, canvas.height);

            if(keys.Left && playerX > 0) playerX -= 4 * dt;
            if(keys.Right && playerX < canvas.width - 20) playerX += 4 * dt;

            ctx.fillStyle = varColor('--primary'); ctx.fillRect(playerX, canvas.height - 20, 20, 12);

            // ירי אוטומטי קל בנוסף לידני
            if(Math.random() < 0.04) lasers.push({x: playerX + 9, y: canvas.height - 20});

            ctx.fillStyle = "#00f5ff";
            for(let i = lasers.length - 1; i >= 0; i--) {
                lasers[i].y -= 5 * dt; ctx.fillRect(lasers[i].x, lasers[i].y, 3, 7);
                if(lasers[i].y < 0) lasers.splice(i, 1);
            }

            if(Math.random() < 0.02) enemies.push({x: Math.random() * (canvas.width - 15), y: 0});

            ctx.fillStyle = varColor('--danger');
            for(let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].y += 1.3 * dt; ctx.fillRect(enemies[i].x, enemies[i].y, 15, 11);

                if(enemies[i].y > canvas.height) { triggerScreenShake(); startSpaceGame(); return; }

                for(let j = lasers.length - 1; j >= 0; j--) {
                    if(lasers[j].x > enemies[i].x && lasers[j].x < enemies[i].x + 15 && lasers[j].y > enemies[i].y && lasers[j].y < enemies[i].y + 11) {
                        createExplosion(enemies[i].x + 7, enemies[i].y + 5); enemies.splice(i, 1); lasers.splice(j, 1); spaceScore += 10;
                        document.getElementById("space-score").innerText = spaceScore; break;
                    }
                }
            }

            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.x += p.vx * dt; p.y += p.vy * dt; p.vx *= 0.95; p.vy *= 0.95; p.alpha -= 0.03 * dt;
                if(p.alpha <= 0) { particles.splice(i, 1); continue; }
                ctx.fillStyle = `rgba(0, 245, 255, ${p.alpha})`; ctx.fillRect(p.x, p.y, 2, 2);
            }

            spaceAnimationId = requestAnimationFrame(updateSpaceGame);
        }
        function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

        /* איקס עיגול */
        let ticBoard = ["","","","","","","","",""], ticPlayer = "X", ticActive = true;
        function resetTicGame() {
            ticBoard = ["","","","","","","","",""]; ticPlayer = "X"; ticActive = true;
            document.getElementById('tic-status').innerText = "תור השחקן: X";
            const b = document.getElementById('tic-board'); if(!b) return; b.innerHTML = '';
            for(let i=0; i<9; i++) { const c = document.createElement('div'); c.classList.add('tic-cell'); c.dataset.index = i; c.onclick = ticCellClick; b.appendChild(c); }
        }
        function ticCellClick() { const idx = this.dataset.index; if(ticBoard[idx] !== "" || !ticActive) return; ticBoard[idx] = ticPlayer; this.innerText = ticPlayer; this.style.color = ticPlayer === "X" ? varColor('--primary') : varColor('--danger'); checkTicWinner(); }
        function checkTicWinner() {
            const patterns = [[0,1,2], [3,4,5], [6,7,8], [0,3,6], [1,4,7], [2,5,8], [0,4,8], [2,4,6]]; let won = false;
            for(let p of patterns) { if(ticBoard[p[0]] !== "" && ticBoard[p[0]] === ticBoard[p[1]] && ticBoard[p[0]] === ticBoard[p[2]]) { won = true; break; } }
            if(won) { document.getElementById('tic-status').innerText = `🏆 שחקן ${ticPlayer} ניצח!`; playSound('win'); ticActive = false; return; }
            if(!ticBoard.includes("")) { document.getElementById('tic-status').innerText = "🤝 תיקו שווה!"; ticActive = false; return; }
            ticPlayer = ticPlayer === "X" ? "O" : "X"; document.getElementById('tic-status').innerText = `תור השחקן: ${ticPlayer}`;
        }

        // אתחול אפליקציה
        renderTimeline(); renderTasks(); setupControls(); resetMemoryGame(); resetTicGame();
    </script>
</body>
</html>
