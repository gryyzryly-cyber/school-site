<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת הפעלה - חיי בית הספר</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        #main-os {
            width: 100%;
            min-height: 100vh;
            display: block; /* מבטיח שהאתר תמיד יוצג */
        }

        .top-bar {
            background-color: #1e1e1e;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
        }

        .nav-tabs {
            display: flex;
            background-color: #181818;
            padding: 10px;
            gap: 10px;
            border-bottom: 1px solid #252525;
            justify-content: center;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #aaa;
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }

        .tab-btn.active {
            background-color: #00adb5;
            color: white;
        }

        .content-section {
            display: none;
            padding: 25px;
            max-width: 700px;
            margin: 0 auto;
        }

        .content-section.active {
            display: block;
        }

        .card {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .progress-container {
            background-color: #333;
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0;
            height: 25px;
            border: 1px solid #444;
        }

        .progress-bar {
            background: linear-gradient(90deg, #00adb5, #00f5ff);
            height: 100%;
            width: 0%;
            transition: width 0.4s ease;
        }

        .timeline-item, .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 10px;
            border-bottom: 1px solid #252525;
            text-align: right;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ff4a4a;
            cursor: pointer;
            font-size: 1.1rem;
            display: none;
        }

        #admin-panel {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            margin: 20px auto;
            max-width: 500px;
            border: 2px dashed #00adb5;
            display: none;
        }

        .admin-controls {
            margin-bottom: 15px;
            text-align: right;
        }

        .admin-input {
            background: #121212;
            border: 1px solid #444;
            color: #fff;
            padding: 8px;
            border-radius: 5px;
            margin: 5px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 750px) {
            .games-grid { grid-template-columns: 1fr 1fr; }
        }

        .memory-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            max-width: 280px;
            margin: 15px auto;
        }

        .memory-card {
            height: 60px;
            background-color: #00adb5;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.6rem;
            color: transparent;
            cursor: pointer;
            user-select: none;
        }

        .memory-card.flipped {
            background-color: #fff;
            color: #121212;
        }

        .memory-card.matched {
            background-color: #28a745;
            color: white;
            cursor: default;
        }

        .game-input {
            width: 80px;
            font-size: 1.5rem;
            text-align: center;
            background: #121212;
            color: #fff;
            border: 1px solid #444;
            padding: 5px;
            border-radius: 5px;
            margin-left: 10px;
        }

        #snake-canvas {
            background-color: #000000;
            display: block;
            margin: 15px auto;
            border: 2px solid #333;
            border-radius: 5px;
        }

        .snake-controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            width: 150px;
            margin: 15px auto 0 auto;
            gap: 6px;
        }

        .snake-btn {
            background-color: #2d2d2d;
            color: white;
            border: 1px solid #444;
            padding: 12px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            user-select: none;
        }
        .snake-btn:active { background-color: #00adb5; }
        
        .pin-btn {
            background-color: #00adb5;
            color: white;
            border: none;
            padding: 8px 15px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="main-os">
        <div class="top-bar">
            <h2>⚡ SCHOOL OS v14.0</h2>
            <button class="pin-btn" onclick="toggleAdminMode()" style="background:#252525; border:1px solid #333; font-size: 1.1rem; padding: 8px 12px;">⚙️ הגדרות לו"ז ומשימות</button>
        </div>

        <div class="nav-tabs">
            <button id="tab-day" class="tab-btn active" onclick="switchTab('my-day', 'tab-day')">📅 היום שלי</button>
            <button id="tab-tasks" class="tab-btn" onclick="switchTab('my-tasks', 'tab-tasks')">🚀 משימות</button>
            <button id="tab-games" class="tab-btn" onclick="switchTab('my-games', 'tab-games')">🎮 מרכז המשחקים</button>
        </div>

        <div id="admin-panel">
            <h3 style="color: #00adb5; margin-top: 0;">🛠️ עריכת תכנים באתר</h3>
            <div class="admin-controls">
                <h5>➕ הוספת פעילות ללו"ז:</h5>
                שעה: <input type="text" id="new-time" class="admin-input" placeholder="08:00" style="width: 60px;">
                פעילות: <input type="text" id="new-activity" class="admin-input" placeholder="שיעור">
                <button class="pin-btn" style="padding: 5px 15px; font-size: 0.9rem;" onclick="addTimelineItem()">הוסף</button>
            </div>
            <div class="admin-controls">
                <h5>➕ הוספת משימה:</h5>
                תיאור: <input type="text" id="new-task-text" class="admin-input" placeholder="משימה...">
                <button class="pin-btn" style="padding: 5px 15px; font-size: 0.9rem;" onclick="addTaskItem()">הוסף</button>
            </div>
        </div>

        <!-- לשונית 1: לו"ז -->
        <div id="my-day" class="content-section active">
            <div class="card">
                <h3>⏰ הלו"ז היומי שלי</h3>
                <div id="timeline-list">
                    <div class="timeline-item">
                        <div><b>08:00</b> - 🎒 הגעה וארגון כיתה</div>
                        <button class="delete-btn" onclick="this.parentElement.remove()">🗑️</button>
                    </div>
                    <div class="timeline-item">
                        <div><b>08:15</b> - 📚 שיעור ראשון</div>
                        <button class="delete-btn" onclick="this.parentElement.remove()">🗑️</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- לשונית 2: משימות -->
        <div id="my-tasks" class="content-section">
            <div class="card">
                <div class="progress-header">
                    <h3>⭐ מד התקדמות משימות</h3>
                    <span id="star-count" style="font-size: 1.2rem;">✨ 0%</span>
                </div>
                <div class="progress-container"><div id="p-bar" class="progress-bar"></div></div>
                <div id="tasks-list">
                    <div class="task-item">
                        <label><input type="checkbox" class="task-check" onclick="updateProgress()"> 📝 להכין מערכת למחר</label>
                        <button class="delete-btn" onclick="this.parentElement.remove(); updateProgress();">🗑️</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- לשונית 3: שלושת המשחקים -->
        <div id="my-games" class="content-section">
            <div class="games-grid">
                
                <div class="card" style="text-align: center;">
                    <h3>🧩 משחק הזיכרון</h3>
                    <div class="memory-board" id="mem-board"></div>
                    <button class="pin-btn" style="padding: 6px 15px; font-size: 0.9rem;" onclick="resetMemoryGame()">התחל מחדש</button>
                </div>
                
                <div class="card" style="text-align: center;">
                    <h3>🔢 ניחוש מספר (1-100)</h3>
                    <input type="number" id="guess-input" class="game-input">
                    <button class="pin-btn" style="padding: 6px 15px; font-size: 0.9rem;" onclick="playGuessGame()">ניחוש</button>
                    <p id="guess-hint" style="margin-top: 15px; color: #00adb5; font-weight: bold;">בחר מספר</p>
                </div>

                <div class="card" style="text-align: center;">
                    <h3>🐍 משחק הנחש (Snake)</h3>
                    <p>ניקוד: <span id="snake-score" style="color:#00adb5; font-weight:bold;">0</span></p>
                    <canvas id="snake-canvas" width="240" height="240"></canvas>
                    <button class="pin-btn" onclick="startSnakeGame()" style="background-color: #28a745; padding: 6px 15px; font-size: 0.9rem;">אפס נחש</button>
                    <div class="snake-controls">
                        <div></div><div class="snake-btn" onclick="changeSnakeDir('UP')">▲</div><div></div>
                        <div class="snake-btn" onclick="changeSnakeDir('LEFT')">◄</div><div></div><div class="snake-btn" onclick="changeSnakeDir('RIGHT')">►</div>
                        <div></div><div class="snake-btn" onclick="changeSnakeDir('DOWN')">▼</div><div></div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        let isAdmin = false;

        // תיקון: הפעלת המשחקים רק אחרי שהדף נטען לחלוטין ומבלי לחסום את התצוגה
        document.addEventListener("DOMContentLoaded", function() {
            setTimeout(() => {
                resetMemoryGame();
                updateProgress();
                startSnakeGame();
            }, 100);
        });

        function toggleAdminMode() {
            isAdmin = !isAdmin;
            if (isAdmin) {
                document.getElementById('admin-panel').style.display = 'block';
                document.querySelectorAll('.delete-btn').forEach(el => el.style.display = 'inline-block');
            } else {
                document.getElementById('admin-panel').style.display = 'none';
                document.querySelectorAll('.delete-btn').forEach(el => el.style.display = 'none');
            }
        }

        function addTimelineItem() {
            const time = document.getElementById('new-time').value;
            const activity = document.getElementById('new-activity').value;
            if(!time || !activity) return;
            const list = document.getElementById('timeline-list');
            const newItem = document.createElement('div');
            newItem.classList.add('timeline-item');
            newItem.innerHTML = `<div><b>${time}</b> - ${activity}</div><button class="delete-btn" style="display:inline-block;" onclick="this.parentElement.remove()">🗑️</button>`;
            list.appendChild(newItem);
            document.getElementById('new-time').value = '';
            document.getElementById('new-activity').value = '';
        }

        function addTaskItem() {
            const taskText = document.getElementById('new-task-text').value;
            if(!taskText) return;
            const list = document.getElementById('tasks-list');
            const newItem = document.createElement('div');
            newItem.classList.add('task-item');
            newItem.innerHTML = `<label><input type="checkbox" class="task-check" onclick="updateProgress()"> 📝 ${taskText}</label><button class="delete-btn" style="display:inline-block;" onclick="this.parentElement.remove(); updateProgress();">🗑️</button>`;
            list.appendChild(newItem);
            document.getElementById('new-task-text').value = '';
            updateProgress();
        }

        function switchTab(tabId, btnId) {
            document.querySelectorAll('.content-section').forEach(section => section.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById(btnId).classList.add('active');
            if(tabId === 'my-games') startSnakeGame();
        }

        function updateProgress() {
            const checkboxes = document.querySelectorAll('.task-check');
            const checked = document.querySelectorAll('.task-check:checked');
            if(checkboxes.length === 0) { document.getElementById('p-bar').style.width = '0%'; document.getElementById('star-count').innerText = '✨ 0%'; return; }
            const percentage = Math.round((checked.length / checkboxes.length) * 100);
            document.getElementById('p-bar').style.width = percentage + '%';
            document.getElementById('star-count').innerText = percentage === 100 ? '🌟 100% מושלם!' : `✨ ${percentage}%`;
        }

        /* ניחוש מספר */
        let secretNumber = Math.floor(Math.random() * 100) + 1;
        function playGuessGame() {
            const userGuess = parseInt(document.getElementById('guess-input').value);
            const hint = document.getElementById('guess-hint');
            if (isNaN(userGuess)) return;
            if (userGuess === secretNumber) { 
                hint.innerHTML = '🎉 בול כל הכבוד!'; 
                secretNumber = Math.floor(Math.random() * 100) + 1; 
            } else if (userGuess > secretNumber) { 
                hint.innerHTML = '📉 גבוה מדי!'; 
            } else { 
                hint.innerHTML = '📈 נמוך מדי!'; 
            }
        }

        /* משחק זיכרון */
        const icons = ['🍎', '🍎', '⚽', '⚽', '🧠', '🧠', '🎒', '🎒', '🎨', '🎨', '📚', '📚', '📝', '📝', '⭐', '⭐'];
        let flippedCards = [];
        let matchedCount = 0;

        function resetMemoryGame() {
            const board = document.getElementById('mem-board');
            if(!board) return;
            board.innerHTML = ''; flippedCards = []; matchedCount = 0;
            const shuffled = icons.sort(() => 0.5 - Math.random());
            shuffled.forEach(icon => {
                const card = document.createElement('div');
                card.classList.add('memory-card');
                card.dataset.icon = icon;
                card.innerText = icon;
                card.addEventListener('click', flipCard);
                board.appendChild(card);
            });
        }

        function flipCard() {
            if (flippedCards.length === 2 || this.classList.contains('flipped') || this.classList.contains('matched')) return;
            this.classList.add('flipped');
            flippedCards.push(this);
            if (flippedCards.length === 2) {
                if (flippedCards[0].dataset.icon === flippedCards[1].dataset.icon) {
                    flippedCards[0].classList.add('matched'); flippedCards[1].classList.add('matched');
                    matchedCount += 2; flippedCards = [];
                    if (matchedCount === icons.length) { alert('🏆 ניצחת במשחק הזיכרון!'); }
                } else {
                    setTimeout(() => { flippedCards[0].classList.remove('flipped'); flippedCards[1].classList.remove('flipped'); flippedCards = []; }, 1000);
                }
            }
        }

        /* סנייק */
        const canvas = document.getElementById("snake-canvas");
        let ctx, box = 12, snake, food, d, score, snakeGameInterval;
        if(canvas) ctx = canvas.getContext("2d");

        function startSnakeGame() {
            if(!canvas || !ctx) return;
            clearInterval(snakeGameInterval);
            snake = [{ x: 9 * box, y: 10 * box }];
            food = { x: Math.floor(Math.random() * 20) * box, y: Math.floor(Math.random() * 20) * box };
            score = 0;
            document.getElementById("snake-score").innerText = score;
            d = "RIGHT"; 
            snakeGameInterval = setInterval(drawSnake, 140);
        }

        function changeSnakeDir(dir) {
            if (dir === "LEFT" && d !== "RIGHT") d = "LEFT";
            else if (dir === "UP" && d !== "DOWN") d = "UP";
            else if (dir === "RIGHT" && d !== "LEFT") d = "RIGHT";
            else if (dir === "DOWN" && d !== "UP") d = "DOWN";
        }

        document.addEventListener("keydown", function(e) {
            if (e.keyCode == 37 && d != "RIGHT") d = "LEFT";
            else if (e.keyCode == 38 && d != "DOWN") d = "UP";
            else if (e.keyCode == 39 && d != "LEFT") d = "RIGHT";
            else if (e.keyCode == 40 && d != "UP") d = "DOWN";
        });

        function drawSnake() {
            if(!ctx) return;
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#00adb5" : "#00f5ff";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
            }

            ctx.fillStyle = "red";
            ctx.fillRect(food.x, food.y, box, box);

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if (d == "LEFT") snakeX -= box;
            if (d == "UP") snakeY -= box;
            if (d == "RIGHT") snakeX += box;
            if (d == "DOWN") snakeY += box;

            if (snakeX == food.x && snakeY == food.y) {
                score++;
                document.getElementById("snake-score").innerText = score;
                food = { x: Math.floor(Math.random() * 20) * box, y: Math.floor(Math.random() * 20) * box };
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            if (snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(snakeGameInterval);
                alert("💥 משחק נגמר! ניקוד: " + score);
                return;
            }
            snake.unshift(newHead);
        }

        function collision(head, array) {
            for (let i = 0; i < array.length; i++) {
                if (head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }
    </script>
</body>
</html>
