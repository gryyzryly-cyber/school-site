<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת הפעלה - חיי בית הספר</title>
    <style>
        /* רקע שחור מלא על כל העמוד */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
        }

        /* מסך נעילה במרכז */
        #lock-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #333;
            width: 280px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .pin-input {
            font-size: 2rem;
            width: 140px;
            text-align: center;
            background: #2d2d2d;
            color: #fff;
            border: 1px solid #444;
            padding: 5px;
            margin-bottom: 15px;
            border-radius: 5px;
        }

        .pin-btn {
            background-color: #00adb5;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
        }

        /* מערכת הפעלה ראשית */
        #main-os {
            display: none;
            width: 100%;
            min-height: 100vh;
        }

        .top-bar {
            background-color: #1e1e1e;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
        }

        .nav-tabs {
            display: flex;
            background-color: #181818;
            padding: 10px;
            gap: 10px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #aaa;
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 5px;
        }

        .tab-btn.active {
            background-color: #00adb5;
            color: white;
        }

        .content-section {
            display: none;
            padding: 25px;
        }

        .content-section.active {
            display: block;
        }

        .card {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
            margin-bottom: 20px;
        }

        /* מד התקדמות */
        .progress-container {
            background-color: #333;
            border-radius: 5px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-bar {
            background-color: #00adb5;
            height: 20px;
            width: 0%;
        }

        .timeline-item, .task-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #252525;
        }

        .delete-btn {
            background: none;
            border: none;
            color: red;
            cursor: pointer;
            display: none;
        }

        .admin-controls {
            display: none;
            background: #1e1e1e;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px dashed #00adb5;
        }

        .admin-input {
            background: #121212;
            border: 1px solid #444;
            color: #fff;
            padding: 5px;
            border-radius: 5px;
            margin-left: 10px;
        }

        /* גריד משחקים משופר */
        .games-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .games-grid { grid-template-columns: 1fr; }
        }

        .memory-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 300px;
            margin: 15px auto;
        }

        .memory-card {
            height: 70px;
            background-color: #00adb5;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            color: transparent;
            cursor: pointer;
        }

        .memory-card.flipped {
            background-color: #fff;
            color: #121212;
        }

        .memory-card.matched {
            background-color: #28a745;
            color: white;
        }

        .game-input {
            width: 80px;
            font-size: 1.5rem;
            text-align: center;
            background: #121212;
            color: #fff;
            border: 1px solid #444;
            padding: 5px;
        }

        /* עיצוב משחק סנייק החדש */
        #snake-canvas {
            background-color: #000000;
            display: block;
            margin: 10px auto;
            border: 2px solid #333;
        }

        .snake-controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            width: 150px;
            margin: 15px auto 0 auto;
            gap: 5px;
        }

        .snake-btn {
            background-color: #2d2d2d;
            color: white;
            border: 1px solid #444;
            padding: 10px;
            text-align: center;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            user-select: none;
        }
        .snake-btn:active { background-color: #00adb5; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h2>🔒 קוד גישה</h2>
        <input type="password" id="pin-code" class="pin-input" maxlength="4" placeholder="••••">
        <br>
        <button class="pin-btn" onclick="checkPin()">כניסה</button>
        <div id="lock-error" style="color: red; margin-top: 10px;"></div>
    </div>
