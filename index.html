<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת הפעלה - בדיקה</title>
    <style>
        body { background-color: #121212; color: white; text-align: center; font-family: Arial; padding: 50px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 10px; border: 2px solid #00adb5; display: inline-block; }
        h1 { color: #00adb5; }
        button { background: #00adb5; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="box">
        <h1>האתר של הלל עובד! 🎉</h1>
        <p>אם אתה רואה את ההודעה הזו, סימן שהקוד החדש נטען בהצלחה.</p>
        <button onclick="alert('הכפתור עובד מעולה!')">לחץ לבדיקת כפתור</button>
    </div>

</body>
</html>
