<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת הפעלה - חיי בית הספר</title>
    <style>
        /* עיצוב בסיסי לכל הדף - שחור ומסך מלא */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* מסך נעילה קטן וממורכז בהתחלה */
        #lock-screen {
            text-align: center;
            background: #1e1e1e;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 2px solid #333;
            margin-top: 15vh;
            width: 320px;
        }

        #lock-screen h1 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #00adb5;
        }

        .pin-input {
            font-size: 2rem;
            width: 150px;
            text-align: center;
            border: 2px solid #444;
            background-color: #2d2d2d;
            color: #fff;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 20px;
            outline: none;
            letter-spacing: 5px;
        }

        .pin-btn {
            background-color: #00adb5;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .pin-btn:hover {
            background-color: #00f5ff;
            box-shadow: 0 0 15px #00adb5;
        }

        /* מערכת הפעלה ראשית - תופסת 100% מהמסך מקצה לקצה! */
        #main-os {
            display: none;
            width: 100%;
            min-height: 100vh;
            background-color: #121212;
        }

        /* סרגל עליון נמתח לכל הרוחב */
        .top-bar {
            background-color: #1e1e1e;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
        }

        .top-bar h2 {
            margin: 0;
            color: #00adb5;
            font-size: 1.8rem;
        }

        /* תפריט הטאבים */
        .nav-tabs {
            display: flex;
            background-color: #181818;
            padding: 10px 30px;
            gap: 15px;
            border-bottom: 1px solid #252525;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #aaa;
            padding: 12px 25px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }

        .tab-btn:hover {
            background-color: #252525;
            color: #fff;
        }

        .tab-btn.active {
            background-color: #00adb5;
            color: #fff;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(0, 173, 181, 0.4);
        }

        /* אזור התוכן - נפתח לרוחב מלא עם מרווחים יפים מהקצוות */
        .content-section {
            display: none;
            padding: 40px;
        }

        .content-section.active {
            display: block;
        }

        /* כרטיסיות גדולות שתופסות את רוב המסך */
        .card {
            background: #1e1e1e;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 25px;
            border: 1px solid #333;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        h3 {
            color: #eee;
            margin-top: 0;
            font-size: 1.6rem;
        }

        /* מד התקדמות משימות */
        .progress-container {
            background-color: #333;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-bar {
            background-color: #00adb5;
            height: 25px;
            width: 0%;
            transition: width 0.5s ease;
            box-shadow: 0 0 10px #00adb5;
        }

        /* פריטי הלו"ז והמשימות */
        .timeline-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #252525;
            font-size: 1.2rem;
        }

        .timeline-main {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .timeline-time {
            font-weight: bold;
            color: #00adb5;
            min-width: 70px;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: #252525;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 1.2rem;
        }

        .task-item input[type="checkbox"] {
            transform: scale(1.4);
            margin-left: 15px;
            cursor: pointer;
        }

        /* כפתורי הניהול והמחיקה */
        .delete-btn {
            background: none;
            border: none;
            color: #ff4a4a;
            cursor: pointer;
            font-size: 1.3rem;
            display: none;
        }

        .admin-controls {
            display: none;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px dashed #00adb5;
        }

        .admin-input {
            background: #121212;
            border: 1px solid #444;
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            margin-left: 15px;
            font-size: 1rem;
        }

        /* רשת המשחקים במסך רחב */
        .games-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .games-grid { grid-template-columns: 1fr; }
        }

        /* משחק זיכרון */
        .memory-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            max-width: 360px;
            margin: 20px auto;
        }

        .memory-card {
            height: 80px;
            background-color: #00adb5;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            color: transparent;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.3s;
        }

        .memory-card.flipped {
            background-color: #fff;
            color: #121212;
        }

        .memory-card.matched {
            background-color: #28a745;
            color: white;
            cursor: default;
        }

        /* משחק ניחושים */
        .guess-box {
            text-align: center;
            padding: 20px;
        }

            width: 120
