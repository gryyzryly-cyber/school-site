<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת הפעלה - חיי בית הספר</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        #main-os {
            width: 100%;
            min-height: 100vh;
        }

        .top-bar {
            background-color: #1e1e1e;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
        }

        .nav-tabs {
            display: flex;
            background-color: #181818;
            padding: 10px;
            gap: 10px;
            border-bottom: 1px solid #252525;
            justify-content: center;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #aaa;
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }

        .tab-btn.active {
            background-color: #00adb5;
            color: white;
        }

        .content-section {
            display: none;
            padding: 25px;
            max-width: 700px;
            margin: 0 auto;
        }

        .content-section.active {
            display: block;
        }

        .card {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .progress-container {
            background-color: #333;
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0;
            height: 25px;
            border: 1px solid #444;
        }

        .progress-bar {
            background: linear-gradient(90deg, #00adb5, #00f5ff);
            height: 100%;
            width: 0%;
            transition: width 0.4s ease;
        }

        .timeline-item, .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 10px;
            border-bottom: 1px solid #252525;
            text-align: right;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ff4a4a;
            cursor: pointer;
            font-size: 1.1rem;
            display: none;
        }

        #admin-panel {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            margin: 20px auto;
            max-width: 500px;
            border: 2px dashed #00adb5;
            display: none;
        }

        .admin-controls {
            margin-bottom: 15px;
            text-align: right;
        }

        .admin-input {
            background: #121212;
            border: 1px solid #444;
            color: #fff;
            padding: 8px;
            border-radius: 5px;
            margin: 5px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 750px) {
            .games-grid { grid-template-columns: 1fr 1fr; }
        }

        .memory-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            max-width: 280px;
            margin: 15px auto;
        }

        .memory-card {
            height: 60px;
            background-color: #00adb5;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.6rem;
            color: transparent;
            cursor: pointer;
            user-select: none;
        }

        .memory-card.flipped {
            background-color: #fff;
            color: #121212;
        }
