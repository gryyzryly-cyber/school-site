<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת הפעלה - חיי בית הספר</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        #lock-screen {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background-color: #1e1e1e;
            padding: 35px;
            border-radius: 15px;
            border: 2px solid #333;
            width: 280px;
            box-shadow: 0 0 25px rgba(0,0,0,0.9);
            z-index: 9999;
        }

        .pin-input {
            font-size: 2rem;
            width: 140px;
            text-align: center;
            background: #2d2d2d;
            color: #fff;
            border: 1px solid #444;
            padding: 8px;
            margin-bottom: 15px;
            border-radius: 8px;
            outline: none;
        }

        .pin-btn {
            background-color: #00adb5;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        #main-os {
            display: none;
            width: 100%;
            min-height: 100vh;
        }

        .top-bar {
            background-color: #1e1e1e;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
        }

        .nav-tabs {
            display: flex;
            background-color: #181818;
            padding: 10px;
            gap: 10px;
            border-bottom: 1px solid #252525;
            justify-content: center;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #aaa;
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 5px;
        }

        .tab-btn.active {
            background-color: #00adb5;
            color: white;
            font-weight: bold;
        }

        .content-section {
            display: none;
            padding: 25px;
            max-width: 700px;
            margin: 0 auto;
        }

        .content-section.active {
            display: block;
        }

        .card {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .progress-container {
            background-color: #333;
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0;
            height: 25px;
            border: 1px solid #444;
        }

        .progress-bar {
            background: linear-gradient(90deg, #00adb5, #00f5ff);
            height: 100%;
            width: 0%;
            transition: width 0.4s ease;
        }

        .timeline-item, .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 10px;
            border-bottom: 1px solid #252525;
            text-align: right;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ff4a4a;
            cursor: pointer;
            font-size: 1.1rem;
            display: none;
        }

        #admin-panel {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            margin: 20px auto;
            max-width: 500px;
            border: 2px dashed #00adb5;
            display: none;
        }

        .admin-controls {
            margin-bottom: 15px;
            text-align: right;
        }

        .admin-input {
            background: #121212;
            border: 1px solid #444;
            color: #fff;
            padding: 8px;
            border-radius: 5px;
            margin: 5px;
        }

        /* גריד למשחקים */
        .games-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 750px) {
            .games-grid { grid-template-columns: 1fr 1fr; }
        }

        /* עיצוב משחק זיכרון */
        .memory-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            max-width: 280px;
            margin: 15px auto;
        }

        .memory-card {
            height: 60px;
            background-color: #00adb5;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.6rem;
            color: transparent;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s;
        }

        .memory-card.flipped {
            background-color: #fff;
            color: #121212;
        }

        .memory-card.matched {
            background-color: #28a745;
            color: white;
            cursor: default;
        }

        /* עיצוב ניחוש מספר */
        .game-input {
            width: 80px;
            font-size: 1.5rem;
            text-align: center;
            background: #121212;
            color: #fff;
            border: 1px solid #444;
            padding: 5px;
            border-radius: 5px;
            margin-left: 10px;
        }

        /* עיצוב סנייק */
        #snake-canvas {
            background-color: #000000;
            display: block;
            margin: 15px auto;
            border: 2px solid #333;
            border-radius: 5px;
        }

        .snake-controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            width: 150px;
            margin: 15px auto 0 auto;
            gap: 6px;
        }

        .snake-btn {
            background-color: #2d2d2d;
            color: white;
            border: 1px solid #444;
            padding: 12px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            user-select: none;
        }
        .snake-btn:active { background-color: #00adb5; }
    </style>
</head>

        <h2>🔒 קוד גישה למערכת</h2>
        <p>הקש 1234 לכניסה:</p>
        <input type="password" id="pin-code" class="pin-input" maxlength="4" placeholder="••••">
        <br>
        <button class="pin-btn" onclick="checkPin()">כניסה</button>
        <div id="lock-error" style="color: #ff4a4a; margin-top: 10px; font-weight: bold;"></div>

        </div>

            <div class="admin-controls">
                <h5>➕ הוספת פעילות ללו"ז:</h5>
                שעה: <input type="text" id="new-time" class="admin-input" placeholder="08:00" style="width: 60px;">
                פעילות: <input type="text" id="new-activity" class="admin-input" placeholder="שיעור">
                <button class="pin-btn" style="padding: 5px 15px; font-size: 0.9rem;" onclick="addTimelineItem()">הוסף</button>
            </div>
            <div class="admin-controls">
                <h5>➕ הוספת משימה:</h5>
                תיאור: <input type="text" id="new-task-text" class="admin-input" placeholder="משימה...">
                <button class="pin-btn" style="padding: 5px 15px; font-size: 0.9rem;" onclick="addTaskItem()">הוסף</button>
            </div>
        </div>
