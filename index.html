<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת ניהול ומשחקים</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --border-color: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--card-bg);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 1.5rem;
            color: var(--primary-color);
        }

        #clock {
            font-size: 1.2rem;
            font-weight: bold;
            background: rgba(0,0,0,0.2);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        nav {
            background-color: #111827;
            padding: 0.5rem 2rem;
            display: flex;
            gap: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 0.75rem 1.25rem;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
            font-weight: 600;
        }

        .nav-btn:hover {
            color: var(--text-color);
            background-color: var(--border-color);
        }

        .nav-btn.active {
            color: var(--text-color);
            background-color: var(--primary-color);
        }

        main {
            flex: 1;
            padding: 2rem;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            margin-bottom: 1.5rem;
        }

        h2 {
            margin-bottom: 1.5rem;
            font-size: 1.3rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .stat-val {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-top: 0.5rem;
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        input, select {
            flex: 1;
            padding: 0.75rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: rgba(0,0,0,0.2);
            color: var(--text-color);
            font-size: 1rem;
        }

        input:focus {
            outline: 2px solid var(--primary-color);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-danger { background-color: var(--danger-color); color: white; }
        .btn-danger:hover { background-color: #b91c1c; }
        .btn-success { background-color: var(--success-color); color: white; }
        .btn-success:hover { background-color: #047857; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            padding: 0.75rem;
            text-align: right;
            border-bottom: 1px solid var(--border-color);
        }

        th { background-color: rgba(0,0,0,0.3); }

        .todo-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            background: rgba(0,0,0,0.2);
            margin-bottom: 0.5rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .todo-item.done span {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background-color: rgba(0,0,0,0.2);
            border-radius: 5px;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--success-color);
            width: 0%;
            transition: width 0.3s;
        }

        /* משחקים */
        .game-menu {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0,0,0,0.3);
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        canvas {
            background-color: #000;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            max-width: 100%;
        }

        .game-hud {
            width: 100%;
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .math-box {
            text-align: center;
            padding: 2rem;
        }

        .math-q {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
        }

        .math-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            max-width: 400px;
            margin: 0 auto;
        }

        .ttt-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            max-width: 300px;
            margin: 0 auto 1.5rem auto;
        }

        .ttt-cell {
            width: 90px;
            height: 90px;
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            font-size: 2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 8px;
        }

        footer {
            background-color: var(--card-bg);
            text-align: center;
            padding: 1rem;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>מערכת ניהול ומשחקים</h1>
        <div id="clock">00:00:00</div>
    </header>

    <nav>
        <button class="nav-btn active" onclick="switchTab('dashboard')">לוח בקרה</button>
        <button class="nav-btn" onclick="switchTab('schedule')">מערכת שעות</button>
        <button class="nav-btn" onclick="switchTab('todo')">משימות</button>
        <button class="nav-btn" onclick="switchTab('games')">משחקים</button>
    </nav>

    <main>
        <section id="dashboard" class="tab-content active">
            <div class="card">
                <h2>מבט על</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div>שיעורים היום</div>
                        <div class="stat-val" id="stat-lessons">0</div>
                    </div>
                    <div class="stat-card">
                        <div>משימות פתוחות</div>
                        <div class="stat-val" id="stat-tasks">0</div>
                    </div>
                    <div class="stat-card">
                        <div>שיא חלליות</div>
                        <div class="stat-val" id="stat-space-high">0</div>
                    </div>
                </div>
            </div>
        </section>

        <section id="schedule" class="tab-content">
            <div class="card">
                <h2>הוספת שיעור למערכת</h2>
                <div class="input-group">
                    <input type="time" id="sched-time">
                    <input type="text" id="sched-subject" placeholder="שם השיעור / פעילות">
                    <button class="btn btn-success" onclick="addLesson()">הוסף</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>שעה</th>
                            <th>שיעור / פעילות</th>
                            <th>פעולות</th>
                        </tr>
                    </thead>
                    <tbody id="schedule-table-body"></tbody>
                </table>
            </div>
        </section>

        <section id="todo" class="tab-content">
            <div class="card">
                <h2>רשימת משימות</h2>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
                <div class="input-group">
                    <input type="text" id="todo-input" placeholder="מה יש לך לעשות?">
                    <button class="btn btn-primary" onclick="addTodo()">הוסף משימה</button>
                </div>
                <div id="todo-list"></div>
            </div>
        </section>

        <section id="games" class="tab-content">
            <div class="card">
                <h2>מתחם משחקים</h2>
                <div class="game-menu">
                    <button class="btn btn-primary" onclick="switchGame('space')">🚀 חלליות</button>
                    <button class="btn btn-primary" onclick="switchGame('coin')">🪙 תפוס מטבע</button>
                    <button class="btn btn-primary" onclick="switchGame('math')">🧠 חשבון מהיר</button>
                    <button class="btn btn-primary" onclick="switchGame('ttt')">❌ איקס עיגול AI</button>
                </div>

                <div id="game-space" class="game-container" style="display:none;">
                    <div class="game-hud">
                        <div>חיים: <span id="space-lives" style="color:var(--danger-color)">❤️❤️❤️</span></div>
                        <div>ניקוד: <span id="space-score">0</span></div>
                    </div>
                    <canvas id="spaceCanvas" width="600" height="400"></canvas>
                </div>

                <div id="game-coin" class="game-container" style="display:none;">
                    <div class="game-hud">
                        <div>זמן: <span id="coin-time">30</span>ס'</div>
                        <div>מטבעות: <span id="coin-score">0</span></div>
                    </div>
                    <canvas id="coinCanvas" width="600" height="400"></canvas>
                </div>

                <div id="game-math" class="game-container" style="display:none;">
                    <div class="game-hud">
                        <div>רצף תשובות: <span id="math-streak">0</span></div>
                    </div>
                    <div class="math-box">
                        <div class="math-q" id="math-question">0 + 0</div>
                        <div class="math-options" id="math-options"></div>
                    </div>
                </div>

                <div id="game-ttt" class="game-container" style="display:none;">
                    <div class="game-hud">
                        <div id="ttt-status">תורך (X)</div>
                    </div>
                    <div class="ttt-grid" id="ttt-grid"></div>
                    <button class="btn btn-danger" onclick="initTTT()">איפוס לוח</button>
                </div>

            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 מערכת ניהול אישית ומשחקים. כל הזכויות שמורות.</p>
    </footer>

    <script>
        // --- שעון מערכת ---
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
        }, 1000);

        // --- ניווט טאבים ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');

            stopAllGames();
            updateDashboardStats();
        }

        // --- לוח בקרה ---
        function updateDashboardStats() {
            const lessons = JSON.parse(localStorage.getItem('lessons')) || [];
            const todos = JSON.parse(localStorage.getItem('todos')) || [];
            
            document.getElementById('stat-lessons').innerText = lessons.length;
            document.getElementById('stat-tasks').innerText = todos.filter(t => !t.done).length;
            document.getElementById('stat-space-high').innerText = localStorage.getItem('space_high') || 0;
        }

        // --- מערכת שעות ---
        let lessons = JSON.parse(localStorage.getItem('lessons')) || [];
        function renderLessons() {
            const tbody = document.getElementById('schedule-table-body');
            tbody.innerHTML = '';
            lessons.sort((a,b) => a.time.localeCompare(b.time));
            lessons.forEach((l, index) => {
                tbody.innerHTML += `
                    <tr>
                        <td>${l.time}</td>
                        <td>${l.subject}</td>
                        <td><button class="btn btn-danger" style="padding:0.3rem 0.6rem; font-size:0.85rem" onclick="deleteLesson(${index})">מחק</button></td>
                    </tr>
                `;
            });
            updateDashboardStats();
        }
        function addLesson() {
            const time = document.getElementById('sched-time').value;
            const subject = document.getElementById('sched-subject').value.trim();
            if(!time || !subject) return;
            lessons.push({time, subject});
            localStorage.setItem('lessons', JSON.stringify(lessons));
            renderLessons();
            document.getElementById('sched-subject').value = '';
        }
        function deleteLesson(index) {
            lessons.splice(index, 1);
            localStorage.setItem('lessons', JSON.stringify(lessons));
            renderLessons();
        }

        // --- רשימת משימות ---
        let todos = JSON.parse(localStorage.getItem('todos')) || [];
        function renderTodos() {
            const list = document.getElementById('todo-list');
            list.innerHTML = '';
            todos.forEach((todo, index) => {
                list.innerHTML += `
                    <div class="todo-item ${todo.done ? 'done' : ''}">
                        <span>${todo.text}</span>
                        <div>
                            <button class="btn btn-success" style="padding:0.3rem 0.6rem; font-size:0.85rem" onclick="toggleTodo(${index})">${todo.done ? 'פתח' : 'בצע'}</button>
                            <button class="btn btn-danger" style="padding:0.3rem 0.6rem; font-size:0.85rem" onclick="deleteTodo(${index})">מחק</button>
                        </div>
                    </div>
                `;
            });

            const doneCount = todos.filter(t => t.done).length;
            const pct = todos.length ? (doneCount / todos.length) * 100 : 0;
            document.getElementById('progress-fill').style.width = pct + '%';
            updateDashboardStats();
        }
        function addTodo() {
            const text = document.getElementById('todo-input').value.trim();
            if(!text) return;
            todos.push({text, done: false});
            localStorage.setItem('todos', JSON.stringify(todos));
            renderTodos();
            document.getElementById('todo-input').value = '';
        }
        function toggleTodo(index) {
            todos[index].done = !todos[index].done;
            localStorage.setItem('todos', JSON.stringify(todos));
            renderTodos();
        }
        function deleteTodo(index) {
            todos.splice(index, 1);
            localStorage.setItem('todos', JSON.stringify(todos));
            renderTodos();
        }

        // --- ניהול החלפת משחקים ---
        function switchGame(gameId) {
            stopAllGames();
            document.getElementById('game-space').style.display = 'none';
            document.getElementById('game-coin').style.display = 'none';
            document.getElementById('game-math').style.display = 'none';
            document.getElementById('game-ttt').style.display = 'none';

            if(gameId === 'space') { document.getElementById('game-space').style.display = 'flex'; startSpaceGame(); }
            if(gameId === 'coin') { document.getElementById('game-coin').style.display = 'flex'; startCoinGame(); }
            if(gameId === 'math') { document.getElementById('game-math').style.display = 'flex'; startMathGame(); }
            if(gameId === 'ttt') { document.getElementById('game-ttt').style.display = 'flex'; initTTT(); }
        }

        function stopAllGames() {
            if(spaceInterval) clearInterval(spaceInterval);
            if(coinInterval) clearInterval(coinInterval);
            window.removeEventListener('keydown', spaceKeydown);
            window.removeEventListener('keyup', spaceKeyup);
            window.removeEventListener('keydown', coinKeydown);
            window.removeEventListener('keyup', coinKeyup);
        }

        // --- משחק 1: חלליות ---
        let spaceInterval, spaceCanvas = document.getElementById('spaceCanvas'), spaceCtx = spaceCanvas.getContext('2d');
        let spaceScore = 0, spaceLives = 3, spacePlayer, lasers, enemies, keys;

        function spaceKeydown(e) { keys[e.code] = true; if(['ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault(); }
        function spaceKeyup(e) { keys[e.code] = false; }

        function startSpaceGame() {
            spaceScore = 0; spaceLives = 3; keys = {}; lasers = []; enemies = [];
            spacePlayer = { x: 280, y: 350, w: 40, h: 30, speed: 6 };
            document.getElementById('space-score').innerText = spaceScore;
            updateLivesUI();
            
            window.addEventListener('keydown', spaceKeydown);
            window.addEventListener('keyup', spaceKeyup);
            
            spaceInterval = setInterval(updateSpace, 1000 / 60);
        }

        function updateLivesUI() {
            let txt = '';
            for(let i=0; i<spaceLives; i++) txt += '❤️';
            document.getElementById('space-lives').innerText = txt || 'פסלת';
        }

        function updateSpace() {
            if(keys['ArrowLeft'] && spacePlayer.x > 0) spacePlayer.x -= spacePlayer.speed;
            if(keys['ArrowRight'] && spacePlayer.x < spaceCanvas.width - spacePlayer.w) spacePlayer.x += spacePlayer.speed;
            if(keys['Space']) {
                keys['Space'] = false;
                lasers.push({ x: spacePlayer.x + spacePlayer.w/2 - 2, y: spacePlayer.y, w: 4, h: 10 });
            }

            if(Math.random() < 0.02) {
                enemies.push({ x: Math.random()*(spaceCanvas.width-30), y: -20, w: 30, h: 20, speed: 3 });
            }

            lasers.forEach((l, i) => { l.y -= 7; if(l.y < 0) lasers.splice(i, 1); });

            enemies.forEach((en, i) => {
                en.y += en.speed;
                if(en.y > spaceCanvas.height) { enemies.splice(i, 1); spaceLives--; updateLivesUI(); }
                
                // התנגשות שחקן
                if(en.x < spacePlayer.x + spacePlayer.w && en.x + en.w > spacePlayer.x && en.y < spacePlayer.y + spacePlayer.h && en.y + en.h > spacePlayer.y) {
                    enemies.splice(i, 1); spaceLives--; updateLivesUI();
                }

                // התנגשות לייזר
                lasers.forEach((l, li) => {
                    if(l.x < en.x + en.w && l.x + l.w > en.x && l.y < en.y + en.h && l.y + l.h > en.y) {
                        enemies.splice(i, 1);
                        lasers.splice(li, 1);
                        spaceScore += 10;
                        document.getElementById('space-score').innerText = spaceScore;
                    }
                });
            });

            if(spaceLives <= 0) {
                const high = localStorage.getItem('space_high') || 0;
                if(spaceScore > high) localStorage.setItem('space_high', spaceScore);
                stopAllGames();
                startSpaceGame();
                return;
            }

            spaceCtx.clearRect(0,0,spaceCanvas.width,spaceCanvas.height);
            spaceCtx.fillStyle = '#3b82f6';
            spaceCtx.fillRect(spacePlayer.x, spacePlayer.y, spacePlayer.w, spacePlayer.h);
            spaceCtx.fillStyle = '#ef4444';
            enemies.forEach(en => spaceCtx.fillRect(en.x, en.y, en.w, en.h));
            spaceCtx.fillStyle = '#eab308';
            lasers.forEach(l => spaceCtx.fillRect(l.x, l.y, l.w, l.h));
        }

        // --- משחק 2: תפוס מטבע ---
        let coinInterval, coinCanvas = document.getElementById('coinCanvas'), coinCtx = coinCanvas.getContext('2d');
        let coinScore, coinTime, coinPlayer, currentCoin, coinKeys;

        function coinKeydown(e) { coinKeys[e.code] = true; if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault(); }
        function coinKeyup(e) { coinKeys[e.code] = false; }

        function startCoinGame() {
            coinScore = 0; coinTime = 30; coinKeys = {};
            coinPlayer = { x: 280, y: 180, w: 30, h: 30, speed: 5 };
            document.getElementById('coin-score').innerText = coinScore;
            document.getElementById('coin-time').innerText = coinTime;
            spawnCoin();

            window.addEventListener('keydown', coinKeydown);
            window.addEventListener('keyup', coinKeyup);

            let lastSec = Date.now();
            coinInterval = setInterval(() => {
                updateCoin();
                if(Date.now() - lastSec >= 1000) {
                    coinTime--;
                    document.getElementById('coin-time').innerText = coinTime;
                    lastSec = Date.now();
                    if(coinTime <= 0) { stopAllGames(); startCoinGame(); }
                }
            }, 1000 / 60);
        }

        function spawnCoin() {
            currentCoin = { x: Math.random()*(coinCanvas.width-20)+10, y: Math.random()*(coinCanvas.height-20)+10, r: 8 };
        }

        function updateCoin() {
            if(coinKeys['ArrowLeft'] && coinPlayer.x > 0) coinPlayer.x -= coinPlayer.speed;
            if(coinKeys['ArrowRight'] && coinPlayer.x < coinCanvas.width - coinPlayer.w) coinPlayer.x += coinPlayer.speed;
            if(coinKeys['ArrowUp'] && coinPlayer.y > 0) coinPlayer.y -= coinPlayer.speed;
            if(coinKeys['ArrowDown'] && coinPlayer.y < coinCanvas.height - coinPlayer.h) coinPlayer.y += coinPlayer.speed;

            let pCenterX = coinPlayer.x + coinPlayer.w/2;
            let pCenterY = coinPlayer.y + coinPlayer.h/2;
            let dist = Math.hypot(pCenterX - currentCoin.x, pCenterY - currentCoin.y);

            if(dist < coinPlayer.w/2 + currentCoin.r) {
                coinScore++;
                document.getElementById('coin-score').innerText = coinScore;
                spawnCoin();
            }

            coinCtx.clearRect(0,0,coinCanvas.width,coinCanvas.height);
            coinCtx.fillStyle = '#10b981';
            coinCtx.fillRect(coinPlayer.x, coinPlayer.y, coinPlayer.w, coinPlayer.h);
            coinCtx.fillStyle = '#eab308';
            coinCtx.beginPath();
            coinCtx.arc(currentCoin.x, currentCoin.y, currentCoin.r, 0, Math.PI*2);
            coinCtx.fill();
        }

        // --- משחק 3: חשבון מהיר ---
        let mathStreak = 0, currentAnswer = 0;
        function startMathGame() {
            mathStreak = 0;
            document.getElementById('math-streak').innerText = mathStreak;
            genMathQuestion();
        }
        function genMathQuestion() {
            const types = ['+', '-', '*'];
            const type = types[Math.floor(Math.random()*types.length)];
            let n1, n2, displaySign;

            if(type === '+') { n1 = Math.floor(Math.random()*40)+10; n2 = Math.floor(Math.random()*40)+10; currentAnswer = n1 + n2; displaySign = '+'; }
            else if(type === '-') { n1 = Math.floor(Math.random()*50)+20; n2 = Math.floor(Math.random()*19)+5; currentAnswer = n1 - n2; displaySign = '-'; }
            else { n1 = Math.floor(Math.random()*10)+2; n2 = Math.floor(Math.random()*9)+2; currentAnswer = n1 * n2; displaySign = '×'; }

            document.getElementById('math-question').innerText = `${n1} ${displaySign} ${n2} = ?`;
            
            let answers = [currentAnswer];
            while(answers.length < 4) {
                let fake = currentAnswer + (Math.floor(Math.random()*10)+1) * (Math.random() > 0.5 ? 1 : -1);
                if(!answers.includes(fake) && fake >= 0) answers.push(fake);
            }
            answers.sort(() => Math.random() - 0.5);

            const optContainer = document.getElementById('math-options');
            optContainer.innerHTML = '';
            answers.forEach(ans => {
                optContainer.innerHTML += `<button class="btn btn-primary" style="font-size:1.2rem; padding:1rem" onclick="checkMath(${ans})">${ans}</button>`;
            });
        }
        function checkMath(chosen) {
            if(chosen === currentAnswer) {
                mathStreak++;
                document.getElementById('math-streak').innerText = mathStreak;
                genMathQuestion();
            } else {
                mathStreak = 0;
                document.getElementById('math-streak').innerText = mathStreak;
                genMathQuestion();
            }
        }

        // --- משחק 4: איקס עיגול ---
        let tttBoard = ["","","","","","","","",""], tttActive = true;
        function initTTT() {
            tttBoard = ["","","","","","","","",""];
            tttActive = true;
            document.getElementById('ttt-status').innerText = "תורך (X)";
            renderTTT();
        }
        function renderTTT() {
            const grid = document.getElementById('ttt-grid');
            grid.innerHTML = '';
            tttBoard.forEach((cell, idx) => {
                grid.innerHTML += `<div class="ttt-cell" onclick="handleTTTClick(${idx})">${cell}</div>`;
            });
        }
        function handleTTTClick(idx) {
            if(tttBoard[idx] !== "" || !tttActive) return;
            tttBoard[idx] = "X";
            renderTTT();
            if(checkTTTWin("X")) { document.getElementById('ttt-status').innerText = "ניצחת!"; tttActive = false; return; }
            if(!tttBoard.includes("")) { document.getElementById('ttt-status').innerText = "תיקו!"; tttActive = false; return; }
            
            tttActive = false;
            document.getElementById('ttt-status').innerText = "המחשב חושב...";
            setTimeout(aiTTT, 400);
        }
        function aiTTT() {
            let blanks = [];
            tttBoard.forEach((c, i) => { if(c === "") blanks.push(i); });
            if(blanks.length > 0) {
                let move = blanks[Math.floor(Math.random()*blanks.length)];
                tttBoard[move] = "O";
            }
            renderTTT();
            if(checkTTTWin("O")) { document.getElementById('ttt-status').innerText = "המחשב ניצח!"; tttActive = false; return; }
            if(!tttBoard.includes("")) { document.getElementById('ttt-status').innerText = "תיקו!"; tttActive = false; return; }
            
            tttActive = true;
            document.getElementById('ttt-status').innerText = "תורך (X)";
        }
        function checkTTTWin(p) {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return wins.some(w => tttBoard[w[0]]===p && tttBoard[w[1]]===p && tttBoard[w[2]]===p);
        }

        // --- הפעלה ראשונית ---
        window.onload = function() {
            renderLessons();
            renderTodos();
            updateDashboardStats();
        };
    </script>
</body>
