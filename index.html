<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת הפעלה - חיי בית הספר</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #08080a;
            color: #e4e6eb;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
        }

        #main-os {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* בר עליון חללי */
        .top-bar {
            background-color: #111115;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #1c1c24;
            box-shadow: 0 4px 25px rgba(0,0,0,0.6);
        }

        .top-bar h2 {
            margin: 0;
            font-size: 1.3rem;
            letter-spacing: 1px;
            color: #00adb5;
            text-shadow: 0 0 12px rgba(0, 173, 181, 0.4);
        }

        /* טאבים בעיצוב נקי וחד */
        .nav-tabs {
            display: flex;
            background-color: #0b0b0e;
            padding: 12px;
            gap: 12px;
            border-bottom: 1px solid #16161f;
            justify-content: center;
        }

        .tab-btn {
            background: #111115;
            border: 1px solid #1c1c24;
            color: #8f94a0;
            padding: 12px 26px;
            font-size: 0.95rem;
            cursor: pointer;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            color: #fff;
            border-color: #00adb5;
            background-color: #16161f;
        }

        .tab-btn.active {
            background-color: #00adb5;
            color: #ffffff;
            border-color: #00adb5;
            box-shadow: 0 0 20px rgba(0, 173, 181, 0.4);
        }

        /* אזורי תוכן */
        .content-section {
            display: none;
            padding: 30px 20px;
            max-width: 850px;
            width: 100%;
            box-sizing: border-box;
            margin: 0 auto;
            animation: slideUp 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* כרטיסיות מתקדמות */
        .card {
            background: #111115;
            padding: 25px;
            border-radius: 16px;
            border: 1px solid #1c1c24;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .card h3 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.2rem;
            border-right: 4px solid #00adb5;
            padding-right: 12px;
        }

        /* מד התקדמות אולטרה-חלק */
        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .progress-container {
            background-color: #171721;
            border-radius: 20px;
            overflow: hidden;
            margin: 15px 0 25px 0;
            height: 22px;
            border: 1px solid #252533;
        }

        .progress-bar {
            background: linear-gradient(90deg, #00adb5, #00f5ff);
            height: 100%;
            width: 0%;
            transition: width 0.6s cubic-bezier(0.1, 1, 0.1, 1);
            box-shadow: 0 0 12px rgba(0, 245, 255, 0.6);
        }

        /* פריטי רשימות */
        .timeline-item, .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 14px;
            border-bottom: 1px solid #171721;
            transition: background 0.2s, transform 0.2s;
            border-radius: 8px;
        }

        .timeline-item:hover, .task-item:hover {
            background: #16161f;
        }

        .task-item label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            user-select: none;
        }

        .task-item input[type="checkbox"] {
            accent-color: #00adb5;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ff4a4a;
            cursor: pointer;
            font-size: 1.1rem;
            display: none;
            opacity: 0.6;
            transition: all 0.2s;
        }
        .delete-btn:hover { opacity: 1; transform: scale(1.2) rotate(8deg); }

        /* פאנל הגדרות מובלט */
        #admin-panel {
            background: #14141c;
            padding: 25px;
            border-radius: 16px;
            margin: 25px auto;
            max-width: 550px;
            width: 90%;
            border: 2px dashed #00adb5;
            display: none;
            box-shadow: 0 0 25px rgba(0, 173, 181, 0.15);
        }

        .admin-controls {
            margin-bottom: 20px;
        }
        .admin-controls h5 { margin: 0 0 10px 0; color: #8f94a0; font-size: 0.95rem; }

        .admin-input {
            background: #08080a;
            border: 1px solid #252533;
            color: #fff;
            padding: 10px 12px;
            border-radius: 8px;
            margin: 5px;
            font-size: 0.9rem;
            transition: border 0.2s;
        }
        .admin-input:focus { outline: none; border-color: #00adb5; }

        /* גריד משחקים */
        .games-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        @media (min-width: 750px) {
            .games-grid { grid-template-columns: 1fr 1fr; }
        }

        /* משחק זיכרון תלת מימד עדין */
        .memory-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 260px;
            margin: 20px auto;
        }

        .memory-card {
            height: 60px;
            background-color: #00adb5;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.6rem;
            color: transparent;
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
        }
        .memory-card:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(0,173,181,0.3); }
        .memory-card.flipped { background-color: #fff; color: #121212; transform: rotateY(180deg); }
        .memory-card.matched { background-color: #28a745; color: white; cursor: default; transform: none; box-shadow: none; }

        .game-input {
            width: 90px;
            font-size: 1.3rem;
            text-align: center;
            background: #08080a;
            color: #fff;
            border: 1px solid #252533;
            padding: 8px;
            border-radius: 8px;
            margin-left: 10px;
        }

        /* קנבס משחק החלליות */
        #space-canvas {
            background-color: #030305;
            display: block;
            margin: 20px auto;
            border: 2px solid #1c1c24;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.7);
        }

        .space-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .space-btn {
            background-color: #171721;
            color: white;
            border: 1px solid #252533;
            padding: 14px 35px;
            font-size: 1.1rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            user-select: none;
            transition: background 0.1s, transform 0.1s;
        }
        .space-btn:active { background-color: #00adb5; transform: scale(0.96); }

        /* משחק איקס עיגול */
        .tic-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            max-width: 190px;
            margin: 20px auto;
        }

        .tic-cell {
            width: 58px;
            height: 58px;
            background-color: #171721;
            border: 1px solid #252533;
            border-radius: 10px;
            font-size: 1.8rem;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s, transform 0.1s;
        }
        .tic-cell:hover { background-color: #20202e; }
        .tic-cell:active { transform: scale(0.95); }
        
        .pin-btn {
            background-color: #00adb5;
            color: white;
            border: none;
            padding: 10px 22px;
            font-size: 0.95rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s, transform 0.1s;
        }
        .pin-btn:hover { background-color: #008c94; }
        .pin-btn:active { transform: scale(0.97); }
    </style>
</head>
<body>

    <div id="main-os">
        <div class="top-bar">
            <h2>⚡ SCHOOL OS v22.0</h2>
            <button class="pin-btn" onclick="toggleAdminMode()" style="background:#171721; border:1px solid #252533; font-size: 1rem; padding: 8px 16px;">⚙️ הגדרות לו"ז ומשימות</button>
        </div>

        <div class="nav-tabs">
            <button id="tab-day" class="tab-btn" onclick="switchTab('my-day', 'tab-day')">📅 היום שלי</button>
            <button id="tab-tasks" class="tab-btn" onclick="switchTab('my-tasks', 'tab-tasks')">🚀 משימות</button>
            <button id="tab-games" class="tab-btn" onclick="switchTab('my-games', 'tab-games')">🎮 מרכז המשחקים</button>
        </div>

        <div id="admin-panel">
            <h3 style="color: #00adb5; margin-top: 0; border: none; padding: 0;">🛠️ עריכת תכנים באתר</h3>
            <div class="admin-controls">
                <h5>➕ הוספת פעילות ללו"ז:</h5>
                שעה: <input type="text" id="new-time" class="admin-input" placeholder="08:00" style="width: 65px;">
                פעילות: <input type="text" id="new-activity" class="admin-input" placeholder="שיעור...">
                <button class="pin-btn" style="padding: 6px 16px; font-size: 0.85rem;" onclick="addTimelineItem()">הוסף</button>
            </div>
            <div class="admin-controls">
                <h5>➕ הוספת משימה:</h5>
                תיאור: <input type="text" id="new-task-text" class="admin-input" placeholder="רשום משימה جديدة...">
                <button class="pin-btn" style="padding: 6px 16px; font-size: 0.85rem;" onclick="addTaskItem()">הוסף</button>
            </div>
        </div>

        <div id="my-day" class="content-section">
            <div class="card">
                <h3>⏰ הלו"ז היומי שלי</h3>
                <div id="timeline-list">
                    </div>
            </div>
        </div>

        <div id="my-tasks" class="content-section">
            <div class="card">
                <div class="progress-header">
                    <h3>⭐ מד התקדמות משימות</h3>
                    <span id="star-count" style="font-size: 1.1rem; font-weight: bold; color: #00adb5;">✨ 0%</span>
                </div>
                <div class="progress-container"><div id="p-bar" class="progress-bar"></div></div>
                <div id="tasks-list">
                    </div>
            </div>
        </div>

        <div id="my-games" class="content-section">
            <div class="games-grid">
                
                <div class="card" style="text-align: center;">
                    <h3>🧩 משחק הזיכרון</h3>
                    <div class="memory-board" id="mem-board"></div>
                    <button class="pin-btn" style="padding: 6px 14px; font-size: 0.85rem;" onclick="resetMemoryGame()">התחל מחדש</button>
                </div>
                
                <div class="card" style="text-align: center;">
                    <h3>🔢 ניחוש מספר (1-100)</h3>
                    <div style="margin: 15px 0;">
                        <input type="number" id="guess-input" class="game-input">
                        <button class="pin-btn" style="padding: 8px 16px; font-size: 0.9rem;" onclick="playGuessGame()">ניחוש</button>
                    </div>
                    <p id="guess-hint" style="color: #00adb5; font-weight: bold; margin: 10px 0 0 0;">בחר מספר להתחלה</p>
                </div>

                <div class="card" style="text-align: center;">
                    <h3>🚀 קרב חלליות רטרו</h3>
                    <p style="margin: 5px 0;">ניקוד: <span id="space-score" style="color:#00adb5; font-weight:bold;">0</span></p>
                    <canvas id="space-canvas" width="240" height="180"></canvas>
                    <button class="pin-btn" onclick="startSpaceGame()" style="background-color: #28a745; padding: 6px 14px; font-size: 0.85rem;">אפס חלליות</button>
                    <div class="space-controls">
                        <button class="space-btn" id="btn-left">◄ שמאל</button>
                        <button class="space-btn" id="btn-right">ימין ►</button>
                    </div>
                </div>

                <div class="card" style="text-align: center;">
                    <h3>❌ משחק איקס עיגול ⭕</h3>
                    <p id="tic-status" style="color: #00adb5; font-weight: bold; margin-bottom: 15px;">תור השחקן: X</p>
                    <div class="tic-board" id="tic-board"></div>
                    <button class="pin-btn" style="padding: 6px 14px; font-size: 0.85rem;" onclick="resetTicGame()">אפס משחק</button>
                </div>

            </div>
        </div>
    </div>

    <script>
        let isAdmin = false;
        let currentTab = 'my-day';

        // נתוני ברירת מחדל אם האתר עולה פעם ראשונה בחיים
        const defaultTimeline = [
            { time: "08:00", text: "🎒 הגעה וארגון כיתה" },
            { time: "08:15", text: "📚 שיעור ראשון" }
        ];
        const defaultTasks = [
            { text: "📝 להכין מערכת למחר", checked: false }
        ];

        document.addEventListener("DOMContentLoaded", function() {
            loadSavedData(); // טעינת הנתונים השמורים של הלל!
            switchTab('my-day', 'tab-day');
            resetMemoryGame();
            resetTicGame();
            setupHoldButtons(); // כפתורי תנועה רציפה לחללית
        });

        // פונקציות שמירה וטעינה אוטומטית (Local Storage)
        function saveToStorage() {
            // שמירת לו"ז
            const timelineItems = [];
            document.querySelectorAll('#timeline-list .timeline-item').forEach(item => {
                const time = item.querySelector('b').innerText;
                const text = item.querySelector('div').innerText.split(' - ')[1];
                timelineItems.push({ time, text });
            });
            localStorage.setItem('schoolOS_timeline', JSON.stringify(timelineItems));

            // שמירת משימות
            const taskItems = [];
            document.querySelectorAll('#tasks-list .task-item').forEach(item => {
                const text = item.querySelector('label').innerText.replace('📝 ', '').trim();
                const checked = item.querySelector('.task-check').checked;
                taskItems.push({ text, checked });
            });
            localStorage.setItem('schoolOS_tasks', JSON.stringify(taskItems));
        }

        function loadSavedData() {
            // טעינת לו"ז
            const savedTimeline = JSON.parse(localStorage.getItem('schoolOS_timeline')) || defaultTimeline;
            const tList = document.getElementById('timeline-list');
            tList.innerHTML = '';
            savedTimeline.forEach(item => {
                const newItem = document.createElement('div');
                newItem.classList.add('timeline-item');
                newItem.innerHTML = `<div><b>${item.time}</b> - ${item.text}</div><button class="delete-btn" onclick="this.parentElement.remove(); saveToStorage();">🗑️</button>`;
                tList.appendChild(newItem);
            });

            // טעינת משימות
            const savedTasks = JSON.parse(localStorage.getItem('schoolOS_tasks')) || defaultTasks;
            const tasksList = document.getElementById('tasks-list');
            tasksList.innerHTML = '';
            savedTasks.forEach(item => {
                const newItem = document.createElement('div');
                newItem.classList.add('task-item');
                newItem.innerHTML = `<label><input type="checkbox" class="task-check" ${item.checked ? 'checked' : ''} onclick="updateProgress(); saveToStorage();"> 📝 ${item.text}</label><button class="delete-btn" onclick="this.parentElement.remove(); updateProgress(); saveToStorage();">🗑️</button>`;
                tasksList.appendChild(newItem);
            });
            updateProgress();
        }

        function toggleAdminMode() {
            isAdmin = !isAdmin;
            document.getElementById('admin-panel').style.display = isAdmin ? 'block' : 'none';
            document.querySelectorAll('.delete-btn').forEach(el => el.style.display = isAdmin ? 'inline-block' : 'none');
        }

        function addTimelineItem() {
            const time = document.getElementById('new-time').value;
            const activity = document.getElementById('new-activity').value;
            if(!time || !activity) return;
            const newItem = document.createElement('div');
            newItem.classList.add('timeline-item');
            newItem.innerHTML = `<div><b>${time}</b> - ${activity}</div><button class="delete-btn" style="display:${isAdmin?'inline-block':'none'};" onclick="this.parentElement.remove(); saveToStorage();">🗑️</button>`;
            document.getElementById('timeline-list').appendChild(newItem);
            document.getElementById('new-time').value = ''; document.getElementById('new-activity').value = '';
            saveToStorage();
        }

        function addTaskItem() {
            const taskText = document.getElementById('new-task-text').value;
            if(!taskText) return;
            const newItem = document.createElement('div');
            newItem.classList.add('task-item');
            newItem.innerHTML = `<label><input type="checkbox" class="task-check" onclick="updateProgress(); saveToStorage();"> 📝 ${taskText}</label><button class="delete-btn" style="display:${isAdmin?'inline-block':'none'};" onclick="this.parentElement.remove(); updateProgress(); saveToStorage();">🗑️</button>`;
            document.getElementById('tasks-list').appendChild(newItem);
            document.getElementById('new-task-text').value = '';
            updateProgress();
            saveToStorage();
        }

        function switchTab(tabId, btnId) {
            currentTab = tabId;
            if(tabId !== 'my-games') stopSpaceEngine();

            document.querySelectorAll('.content-section').forEach(section => {
                section.classList.remove('active');
                section.style.display = 'none';
            });
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            const activeSection = document.getElementById(tabId);
            if(activeSection) {
                activeSection.classList.add('active');
                activeSection.style.display = 'block';
            }
            const activeBtn = document.getElementById(btnId);
            if(activeBtn) activeBtn.classList.add('active');
            
            if(tabId === 'my-games') startSpaceGame();
        }

        function updateProgress() {
            const checkboxes = document.querySelectorAll('.task-check');
            const checked = document.querySelectorAll('.task-check:checked');
            if(checkboxes.length === 0) { document.getElementById('p-bar').style.width = '0%'; document.getElementById('star-count').innerText = '✨ 0%'; return; }
            const percentage = Math.round((checked.length / checkboxes.length) * 100);
            document.getElementById('p-bar').style.width = percentage + '%';
            document.getElementById('star-count').innerText = percentage === 100 ? '🌟 100% מושלם!' : `✨ ${percentage}%`;
        }

        /* משחק ניחושים */
        let secretNumber = Math.floor(Math.random() * 100) + 1;
        function playGuessGame() {
            const userGuess = parseInt(document.getElementById('guess-input').value);
            const hint = document.getElementById('guess-hint');
            if (isNaN(userGuess)) return;
            if (userGuess === secretNumber) { 
                hint.innerHTML = '🎉 בול כל הכבוד!'; secretNumber = Math.floor(Math.random() * 100) + 1; 
            } else { hint.innerHTML = userGuess > secretNumber ? '📉 גבוה מדי!' : '📈 נמוך מדי!'; }
        }

        /* משחק זיכרון */
        const icons = ['🍎', '🍎', '⚽', '⚽', '🧠', '🧠', '🎒', '🎒', '🎨', '🎨', '📚', '📚', '📝', '📝', '⭐', '⭐'];
        let flippedCards = []; let matchedCount = 0;
        function resetMemoryGame() {
            const board = document.getElementById('mem-board'); if(!board) return;
            board.innerHTML = ''; flippedCards = []; matchedCount = 0;
            const shuffled = icons.sort(() => 0.5 - Math.random());
            shuffled.forEach(icon => {
                const card = document.createElement('div'); card.classList.add('memory-card');
                card.dataset.icon = icon; card.innerText = icon; card.addEventListener('click', flipCard);
                board.appendChild(card);
            });
        }
        function flipCard() {
            if (flippedCards.length === 2 || this.classList.contains('flipped') || this.classList.contains('matched')) return;
            this.classList.add('flipped'); flippedCards.push(this);
            if (flippedCards.length === 2) {
                if (flippedCards[0].dataset.icon === flippedCards[1].dataset.icon) {
                    flippedCards[0].classList.add('matched'); flippedCards[1].classList.add('matched');
                    matchedCount += 2; flippedCards = [];
                } else { setTimeout(() => { flippedCards[0].classList.remove('flipped'); flippedCards[1].classList.remove('flipped'); flippedCards = []; }, 800); }
            }
        }

        /* מנוע חלליות 60FPS משודרג עם אפקט פיצוצים חלקיקים */
        const sCanvas = document.getElementById("space-canvas");
        let sCtx = sCanvas ? sCanvas.getContext("2d") : null;
        let playerX, enemies, lasers, particles, spaceScore, spaceAnimationId = null;
        let keysHold = { Left: false, Right: false };

        function startSpaceGame() {
            if(!sCanvas || !sCtx) return;
            stopSpaceEngine();
            playerX = sCanvas.width / 2 - 10;
            enemies = []; lasers = []; particles = []; spaceScore = 0;
            document.getElementById("space-score").innerText = spaceScore;
            spaceAnimationId = requestAnimationFrame(updateSpaceGame);
        }

        function stopSpaceEngine() {
            if(spaceAnimationId) { cancelAnimationFrame(spaceAnimationId); spaceAnimationId = null; }
        }

        // האזנה רציפה למקלדת
        document.addEventListener("keydown", function(e) {
            if (currentTab === 'my-games') {
                if(e.key === "ArrowLeft") { keysHold.Left = true; e.preventDefault(); }
                if(e.key === "ArrowRight") { keysHold.Right = true; e.preventDefault(); }
            }
        });
        document.addEventListener("keyup", function(e) {
            if(e.key === "ArrowLeft") keysHold.Left = false;
            if(e.key === "ArrowRight") keysHold.Right = false;
        });

        // תנועה רציפה בלחיצה ארוכה על כפתורי המסך (לטלפונים ומחשבים)
        function setupHoldButtons() {
            const btnL = document.getElementById('btn-left');
            const btnR = document.getElementById('btn-right');
            if(!btnL || !btnR) return;

            const startLeft = (e) => { keysHold.Left = true; e.preventDefault(); };
            const startRight = (e) => { keysHold.Right = true; e.preventDefault(); };
            const stopAll = () => { keysHold.Left = false; keysHold.Right = false; };

            btnL.addEventListener('mousedown', startLeft); btnL.addEventListener('touchstart', startLeft);
            btnR.addEventListener('mousedown', startRight); btnR.addEventListener('touchstart', startRight);
            window.addEventListener('mouseup', stopAll); window.addEventListener('touchend', stopAll);
        }

        // יצירת חלקיקי פיצוץ
        function createExplosion(x, y) {
            for(let i=0; i<8; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    alpha: 1,
                    color: Math.random() > 0.5 ? '#00f5ff' : '#ff4a4a'
                });
            }
        }

        function updateSpaceGame() {
            if (currentTab !== 'my-games' || !sCtx) { stopSpaceEngine(); return; }
            
            sCtx.fillStyle = "#030305";
            sCtx.fillRect(0, 0, sCanvas.width, sCanvas.height);

            // הזזת חללית לפי כפתורים לחוצים
            if(keysHold.Left && playerX > 0) playerX -= 4;
            if(keysHold.Right && playerX < sCanvas.width - 20) playerX += 4;

            // ציור חללית
            sCtx.fillStyle = "#00adb5";
            sCtx.fillRect(playerX, sCanvas.height - 20, 20, 12);

            // יצירת לייזר אוטומטי
            if(Math.random() < 0.06) { lasers.push({x: playerX + 9, y: sCanvas.height - 20}); }

            // עדכון לייזרים
            sCtx.fillStyle = "#00f5ff";
            for(let i = lasers.length - 1; i >= 0; i--) {
                lasers[i].y -= 5;
                sCtx.fillRect(lasers[i].x, lasers[i].y, 3, 7);
                if(lasers[i].y < 0) lasers.splice(i, 1);
            }

            // יצירת אויבים
            if(Math.random() < 0.025) { enemies.push({x: Math.random() * (sCanvas.width - 15), y: 0}); }

            // עדכון אויבים
            sCtx.fillStyle = "#ff4a4a";
            for(let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].y += 1.3;
                sCtx.fillRect(enemies[i].x, enemies[i].y, 15, 11);

                if(enemies[i].y > sCanvas.height) { startSpaceGame(); return; }

                for(let j = lasers.length - 1; j >= 0; j--) {
                    if(lasers[j].x > enemies[i].x && lasers[j].x < enemies[i].x + 15 && lasers[j].y > enemies[i].y && lasers[j].y < enemies[i].y + 11) {
                        createExplosion(enemies[i].x + 7, enemies[i].y + 5); // פיצוץ!
                        enemies.splice(i, 1); lasers.splice(j, 1); spaceScore += 10;
                        document.getElementById("space-score").innerText = spaceScore;
                        break;
                    }
                }
            }

            // עדכון וציור חלקיקי פיצוץ
            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.alpha -= 0.04;
                if(p.alpha <= 0) { particles.splice(i, 1); continue; }
                sCtx.fillStyle = p.color;
                sCtx.globalAlpha = p.alpha;
                sCtx.fillRect(p.x, p.y, 2, 2);
            }
            sCtx.globalAlpha = 1.0; // החזרת השקיפות למצב רגיל

            spaceAnimationId = requestAnimationFrame(updateSpaceGame);
        }

        /* משחק איקס עיגול */
        let ticBoard = ["", "", "", "", "", "", "", "", ""]; let ticCurrentPlayer = "X"; let ticActive = true;
        function resetTicGame() {
            ticBoard = ["", "", "", "", "", "", "", "", ""]; ticCurrentPlayer = "X"; ticActive = true;
            document.getElementById('tic-status').innerText = "תור השחקן: X";
            const boardDiv = document.getElementById('tic-board'); if(!boardDiv) return;
            boardDiv.innerHTML = '';
            for(let i=0; i<9; i++) {
                const cell = document.createElement('div'); cell.classList.add('tic-cell');
                cell.dataset.index = i; cell.addEventListener('click', ticCellClick);
                boardDiv.appendChild(cell);
            }
        }
        function ticCellClick() {
            const idx = this.dataset.index;
            if(ticBoard[idx] !== "" || !ticActive) return;
            ticBoard[idx] = ticCurrentPlayer; this.innerText = ticCurrentPlayer;
            this.style.color = ticCurrentPlayer === "X" ? "#00adb5" : "#ff4a4a";
            checkTicWinner();
        }
        function checkTicWinner() {
            const winPatterns = [[0,1,2], [3,4,5], [6,7,8], [0,3,6], [1,4,7], [2,5,8], [0,4,8], [2,4,6]];
            let won = false;
            for(let pattern of winPatterns) {
                if(ticBoard[pattern[0]] !== "" && ticBoard[pattern[0]] === ticBoard[pattern[1]] && ticBoard[pattern[0]] === ticBoard[pattern[2]]) { won = true; break; }
            }
            if(won) { document.getElementById('tic-status').innerText = `🏆 שחקן ${ticCurrentPlayer} ניצח!`; ticActive = false; return; }
            if(!ticBoard.includes("")) { document.getElementById('tic-status').innerText = "🤝 תיקו שווה!"; ticActive = false; return; }
            ticCurrentPlayer = ticCurrentPlayer === "X" ? "O" : "X";
            document.getElementById('tic-status').innerText = `תור השחקן: ${ticCurrentPlayer}`;
        }
    </script>
</body>
</html>
