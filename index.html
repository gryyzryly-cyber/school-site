<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת הפעלה - חיי בית הספר</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 0;
            margin: 0;
        }
        .top-bar {
            background-color: #1e1e1e;
            padding: 15px;
            border-bottom: 2px solid #333;
        }
        h1 { color: #00adb5; margin: 0 0 10px 0; font-size: 1.8rem; }
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            background: #252525;
            border: 1px solid #444;
            color: #aaa;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 1rem;
        }
        .tab-btn.active {
            background-color: #00adb5;
            color: white;
            font-weight: bold;
        }
        .content-section {
            display: none;
            max-width: 500px;
            margin: 20px auto;
            padding: 20px;
            background-color: #1e1e1e;
            border-radius: 10px;
            border: 1px solid #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .content-section.active {
            display: block;
        }
        .list-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid #2d2d2d;
            text-align: right;
        }
        #canvas {
            background: #000;
            display: block;
            margin: 20px auto;
            border: 2px solid #333;
        }
        .btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1.1rem;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <h1>⚡ SCHOOL OS v2.0 ⚡</h1>
        <div class="nav-tabs">
            <button id="btn-day" class="tab-btn active" onclick="switchTab('day-section', 'btn-day')">📅 הלו"ז והמשימות שלי</button>
            <button id="btn-game" class="tab-btn" onclick="switchTab('game-section', 'btn-game')">🎮 משחק סנייק</button>
        </div>
    </div>

    <div id="day-section" class="content-section active">
        <h3>⏰ הלו"ז היומי שלי</h3>
        <div class="list-item"><b>08:00</b> - 🎒 הגעה וארגון כיתה</div>
        <div class="list-item"><b>08:15</b> - 📚 שיעור ראשון</div>
        <div class="list-item"><b>09:45</b> - 🍎 הפסקת אוכל ומשחק</div>
        
        <br><hr style="border: 1px solid #2d2d2d;"><br>
        
        <h3>🚀 משימות לבצע</h3>
        <div class="list-item"><input type="checkbox"> 📝 להכין מערכת למחר</div>
        <div class="list-item"><input type="checkbox"> 🧠 לסיים שיעורי בית</div>
        <div class="list-item"><input type="checkbox"> 🎒 לסדר את התיק</div>
    </div>

    <div id="game-section" class="content-section">
        <h3>🐍 משחק הנחש (Snake)</h3>
        <p>ניקוד: <span id="score" style="color:#00adb5; font-weight:bold;">0</span></p>
        <canvas id="canvas" width="240" height="240"></canvas>
        <button class="btn" onclick="startSnake()">התחל משחק</button>
    </div>

    <script>
        // פונקציה פשוטה ובטוחה למעבר בין הלשוניות
        function switchTab(sectionId, buttonId) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(sectionId).classList.add('active');
            document.getElementById(buttonId).classList.add('active');
            
            // אם עברנו למשחק, נפעיל אותו אוטומטית
            if(sectionId === 'game-section') {
                startSnake();
            }
        }

        /* קוד סנייק שעובד */
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        let box = 12, snake, food, d, score, interval;

        function startSnake() {
            clearInterval(interval);
            snake = [{x: 9*box, y: 10*box}];
            food = {x: Math.floor(Math.random()*20)*box, y: Math.floor(Math.random()*20)*box};
            score = 0;
            document.getElementById("score").innerText = score;
            d = "RIGHT";
            interval = setInterval(draw, 140);
        }

        document.addEventListener("keydown", e => {
            if(e.keyCode == 37 && d != "RIGHT") d = "LEFT";
            if(e.keyCode == 38 && d != "DOWN") d = "UP";
            if(e.keyCode == 39 && d != "LEFT") d = "RIGHT";
            if(e.keyCode == 40 && d != "UP") d = "DOWN";
        });

        function draw() {
            ctx.fillStyle = "#000"; ctx.fillRect(0, 0, 240, 240);
            for(let i=0; i<snake.length; i++) {
                ctx.fillStyle = i==0 ? "#00adb5" : "#00f5ff";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
            }
            ctx.fillStyle = "red"; ctx.fillRect(food.x, food.y, box, box);
            
            let nx = snake[0].x, ny = snake[0].y;
            if(d == "LEFT") nx -= box; if(d == "UP") ny -= box;
            if(d == "RIGHT") nx += box; if(d == "DOWN") ny += box;

            if(nx == food.x && ny == food.y) {
                score++; document.getElementById("score").innerText = score;
                food = {x: Math.floor(Math.random()*20)*box, y: Math.floor(Math.random()*20)*box};
            } else { snake.pop(); }

            let head = {x: nx, y: ny};
            if(nx<0 || nx>=240 || ny<0 || ny>=240 || snake.some(s => s.x==head.x && s.y==head.y)) {
                clearInterval(interval);
                alert("המשחק נגמר! ניקוד: " + score);
                return;
            }
            snake.unshift(head);
        }
    </script>
</body>
</html>
